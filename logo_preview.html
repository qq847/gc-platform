<!DOCTYPE html>

<title>Logo Height Preview</title>

.row {

  height: 56px; display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  margin-bottom: 16px; border-radius: 10px;
}
.label { font-size: 12px; color: #6b7280; margin-left: auto; font-weight: 600; }
</style>
</head>
<body>

</div>

<div class="row">
