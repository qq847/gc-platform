<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Projects — Game Connection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#e8e4da;font-family:"DM Sans","PingFang SC",sans-serif;color:#1c1a17}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#e8e4da;padding-bottom:80px}

:root{
  --orange:#d95f2b;--orange-dim:rgba(217,95,43,0.1);--orange-border:rgba(217,95,43,0.25);
  --teal:#0a7fa8;--teal-dim:rgba(10,127,168,0.1);--teal-border:rgba(10,127,168,0.22);
  --green:#0d9b72;--green-dim:rgba(13,155,114,0.1);--green-border:rgba(13,155,114,0.25);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,0.1);--purple-border:rgba(124,58,237,0.25);
  --amber:#b45309;--amber-dim:rgba(180,83,9,0.1);--amber-border:rgba(180,83,9,0.25);
  --card:#fff;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.05);
  --text1:#1c1a17;--text2:#6b6660;--text3:#a09890;
  --s1:0 1px 3px rgba(0,0,0,0.07),0 0 1px rgba(0,0,0,0.04);
}

/* ── TOP BAR ── */
.topbar{
  background:rgba(232,228,218,0.97);padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.tb-back{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.tb-meta{flex:1;display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;}
.tb-count{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;}
.tb-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.tb-sub{font-size:12px;color:var(--text2);white-space:nowrap;}
.tb-icon-btn{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text2);}
.tb-icon-btn:hover{background:rgba(0,0,0,0.1);}

/* ── SEARCH BAR ── */
.search-wrap{padding:0 14px 10px;display:none;}
.search-wrap.show{display:block;}
.search-box{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:0 12px;gap:8px;box-shadow:var(--s1);}
.search-box:focus-within{border-color:var(--teal);}
.search-input{flex:1;border:none;outline:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text1);padding:9px 0;}
.search-input::placeholder{color:var(--text3);}
.search-clear{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0;display:none;}
.search-clear.visible{display:block;}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:6px;padding:10px 14px 10px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.filter-row::-webkit-scrollbar{display:none}
.ftag{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px;box-shadow:var(--s1);}
.ftag:hover:not(.active){border-color:rgba(0,0,0,0.2);color:var(--text1);}
.ftag.active{color:#fff;border-color:transparent;}
.ftag[data-f="all"].active{background:var(--text1);}
.ftag[data-f="Publisher"].active{background:var(--orange);}
.ftag[data-f="Investment"].active{background:var(--green);}
.ftag[data-f="Co-dev"].active{background:var(--purple);}
.ftag[data-f="Porting"].active{background:var(--amber);}

/* View toggle */
.view-toggle{display:flex;gap:0;padding:0 14px 10px;}
.vt-btn{flex:1;padding:7px 0;font-size:12px;font-weight:600;font-family:inherit;border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.vt-btn:first-child{border-radius:8px 0 0 8px;border-right:none;}
.vt-btn:last-child{border-radius:0 8px 8px 0;}
.vt-btn.active{background:var(--text1);color:#fff;border-color:var(--text1);}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 8px;}
.section-title{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);}
.section-count{font-size:11px;color:var(--text3);font-weight:500;background:rgba(0,0,0,0.05);padding:2px 8px;border-radius:10px;}

/* ── CARD LIST ── */
.card-list{padding:0 12px;display:flex;flex-direction:column;gap:8px;}

/* ── EXHIBITOR CARD ── */
.ex-card{
  background:var(--card);border-radius:14px;
  border:1px solid rgba(0,0,0,0.07);
  box-shadow:0 1px 4px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.03);
  overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,transform .1s;
}
.ex-card:active{transform:scale(.99)}

.ex-head{display:flex;align-items:center;padding:12px 12px 10px;gap:10px;}
.ex-avatar{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.5px;
}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-game{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ex-booth{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.3px;}
.booth-pod{background:rgba(10,127,168,0.1);border:1px solid rgba(10,127,168,0.25);color:var(--teal);}
.booth-standard{background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);}

/* Tags row */
.ex-tags{display:flex;gap:4px;padding:0 12px 8px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;align-items:center;}
.ex-tags::-webkit-scrollbar{display:none;}
.ex-tag{flex-shrink:0;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.tag-publisher{background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);}
.tag-investment{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);}
.tag-codev{background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple);}
.tag-porting{background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber);}
.ex-platform{flex-shrink:0;font-size:13px;margin-left:auto;}

/* Action row */
.ex-actions{display:flex;align-items:center;padding:0 12px 11px;gap:7px;}
.ex-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;border:none;white-space:nowrap;}
.ex-btn-meet{background:var(--orange);color:#fff;}
.ex-btn-meet:hover{opacity:.88}
.ex-btn-view{background:rgba(0,0,0,0.05);border:1px solid var(--border);color:var(--text2);}
.ex-btn-view:hover{background:rgba(0,0,0,0.09);}
.ex-expand-toggle{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);font-weight:600;}
.ex-expand-toggle svg{transition:transform .2s;}
.ex-card.open .ex-expand-toggle svg{transform:rotate(180deg);}

/* ── EXPANDED DETAIL ── */
.ex-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border2);}
.ex-card.open .ex-detail{display:block;}
.ex-detail-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:10px 0 5px;}
.ex-detail-desc{font-size:12px;color:var(--text2);line-height:1.6;}
.ex-games-list{display:flex;flex-direction:column;gap:6px;}
.ex-game-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(0,0,0,0.03);border-radius:8px;border:1px solid var(--border);}
.ex-game-emoji{font-size:18px;flex-shrink:0;}
.ex-game-info{flex:1;min-width:0;}
.ex-game-name{font-size:12px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-game-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.ex-game-status{flex-shrink:0;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;}
.status-alpha{background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber);}
.status-demo{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);}
.status-release{background:var(--teal-dim);border:1px solid var(--teal-border);color:var(--teal);}

/* ── MAP VIEW ── */
.map-view{display:none;padding:12px;}
.map-view.show{display:block;}
.map-container{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--s1);}
.map-container svg{width:100%;display:block;}
.map-legend{display:flex;gap:14px;padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:50px 20px;color:var(--text3);display:none;}
.empty.show{display:block;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.6;}

/* ── SHEET OVERLAY ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:none;align-items:flex-end;max-width:480px;margin:0 auto;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sheet-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.sheet-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-0.5px;}
.sheet-info{flex:1;min-width:0;}
.sheet-name{font-size:16px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sheet-meta-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.sheet-close{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;font-size:14px;}
.sheet-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:90px;}
.sheet-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.sheet-desc{font-size:13px;color:var(--text2);line-height:1.65;}
.sheet-games{display:flex;flex-direction:column;gap:8px;}
.sheet-game-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,0.03);border-radius:10px;border:1px solid var(--border);}
.sheet-game-emoji{font-size:22px;flex-shrink:0;}
.sheet-game-info{flex:1;min-width:0;}
.sheet-game-name{font-size:13px;font-weight:600;color:var(--text1);}
.sheet-game-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.sheet-contact{padding:12px 14px;background:rgba(0,0,0,0.03);border-radius:10px;border:1px dashed var(--border);display:flex;align-items:center;gap:10px;}
.sheet-contact-icon{font-size:20px;}
.sheet-contact-info{flex:1;}
.sheet-contact-hint{font-size:12px;font-weight:600;color:var(--text2);}
.sheet-contact-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.sheet-contact-btn{padding:6px 12px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* Sheet footer */
.sheet-footer{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,0.97);border-top:1px solid var(--border);display:none;gap:8px;align-items:center;z-index:600;backdrop-filter:blur(10px);}
.sheet-footer.visible{display:flex;}
.sf-fav{width:38px;height:38px;border-radius:8px;background:rgba(0,0,0,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.sf-fav.active{background:rgba(220,38,38,0.08);border-color:rgba(220,38,38,0.3);}
.sf-meet{flex:1;padding:10px 14px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.sf-meet:hover{opacity:.9}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1a17;color:#fff;padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:3000;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ UNIFIED BOTTOM NAV ═══ */
.gc-bnav{position:fixed;bottom:0;left:0;right:0;height:58px;background:rgba(232,228,218,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;padding:0;z-index:9999;max-width:480px;margin:0 auto;}
.gc-bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:6px 0;text-decoration:none;color:inherit;position:relative;}
.gc-bn-i{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.gc-bn-i svg{stroke:#b0aba3;stroke-width:1.8;transition:stroke .15s;}
.gc-bn-l{font-size:9px;font-weight:600;color:#b0aba3;letter-spacing:.3px;text-transform:uppercase;transition:color .15s;}
.gc-bn.active .gc-bn-l{color:#e85d26;}
.gc-bn.active .gc-bn-i svg{stroke:#e85d26 !important;}
.gc-bn:hover .gc-bn-l{color:#6b6660;}
.gc-bn:hover .gc-bn-i svg{stroke:#6b6660;}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <button class="tb-back" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="tb-meta">
    <span class="tb-count" id="tb-count">12 projects</span>
    <span class="tb-dot"></span>
    <span class="tb-sub">Exhibitors</span>
  </div>
  <button class="tb-icon-btn" id="searchToggle" title="Search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button class="tb-icon-btn" title="Notifications">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </button>
</div>

<!-- SEARCH BAR -->
<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search companies, games…">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<!-- FILTER ROW -->
<div class="filter-row" id="filterRow">
  <button class="ftag active" data-f="all">All</button>
  <button class="ftag" data-f="Publisher">Publisher</button>
  <button class="ftag" data-f="Investment">Investment</button>
  <button class="ftag" data-f="Co-dev">Co-dev</button>
  <button class="ftag" data-f="Porting">Porting</button>
</div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="vt-btn active" id="toggleList" onclick="switchView('list')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    List
  </button>
  <button class="vt-btn" id="toggleMap" onclick="switchView('map')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
    Floor Map
  </button>
</div>

<!-- SECTION HEADER -->
<div class="section-header">
  <span class="section-title">Exhibitors</span>
  <span class="section-count" id="countLabel">12 projects</span>
</div>

<!-- CARD LIST -->
<div class="card-list" id="cardList"></div>

<!-- MAP VIEW -->
<div class="map-view" id="mapView">
  <div class="map-container">
    <svg id="floorMapSvg" viewBox="0 0 360 320" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="map-legend">
      <span><span class="legend-dot" style="background:#d6e8f8;border:1px solid #1a6fa8;"></span>Pod</span>
      <span><span class="legend-dot" style="background:#f0e2d0;border:1px solid #9a5b1c;"></span>Standard</span>
      <span><span class="legend-dot" style="background:#d95f2b;"></span>Selected</span>
    </div>
  </div>
</div>

<!-- EMPTY STATE -->
<div class="empty" id="emptyState">
  <div class="empty-icon">🔍</div>
  <div class="empty-title">No exhibitors found</div>
  <div class="empty-sub">Try a different search term or filter</div>
</div>

</div><!-- /app -->

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-avatar" id="sheetAvatar"></div>
      <div class="sheet-info">
        <div class="sheet-name" id="sheetName"></div>
        <div class="sheet-meta-row" id="sheetMeta"></div>
      </div>
      <button class="sheet-close" onclick="closeSheetDirect()">✕</button>
    </div>
    <div class="sheet-body">
      <div>
        <div class="sheet-section-label">About</div>
        <div class="sheet-desc" id="sheetDesc"></div>
      </div>
      <div>
        <div class="sheet-section-label">Games at This Booth</div>
        <div class="sheet-games" id="sheetGames"></div>
      </div>
      <div>
        <div class="sheet-section-label">Contact</div>
        <div class="sheet-contact">
          <div class="sheet-contact-icon">🔒</div>
          <div class="sheet-contact-info">
            <div class="sheet-contact-hint">Registered attendees only</div>
            <div class="sheet-contact-sub">Log in to view contact info</div>
          </div>
          <button class="sheet-contact-btn" onclick="showToast('Opening login…')">Log In</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SHEET FOOTER -->
<div class="sheet-footer" id="sheetFooter">
  <button class="sf-fav" id="sfFav" onclick="toggleFav()">🤍</button>
  <button class="sf-meet" onclick="bookMeeting()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Book Meeting
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const EXHIBITORS = [
  {id:1,company:"Pixelwave Studios",booth:"P01",boothType:"Pod",genres:["RPG"],platforms:["PC","Console"],seeking:["Publisher","Investment"],mainGame:"Chronicles of Aether",gameCount:2,color:"#6366f1",desc:"Pixelwave Studios is an award-winning indie developer based in Berlin, specializing in narrative-driven RPGs with deep world-building and emergent gameplay systems. Founded in 2018 with a team of 28.",games:[{name:"Chronicles of Aether",genre:"RPG",platform:"PC / Console",status:"demo",emoji:"⚔️"},{name:"Aether: Prologue",genre:"RPG",platform:"PC",status:"release",emoji:"🗺️"}]},
  {id:2,company:"NeonArk Games",booth:"B02",boothType:"Standard Booth",genres:["Action"],platforms:["Mobile"],seeking:["Co-dev"],mainGame:"Pulse Riders",gameCount:3,color:"#ec4899",desc:"NeonArk is a mobile-first game studio from Seoul pushing the boundaries of touch-based action games. With 5 million downloads across their catalog, they're looking for technical co-development partners.",games:[{name:"Pulse Riders",genre:"Action",platform:"iOS / Android",status:"alpha",emoji:"🏎️"},{name:"Neon Rush",genre:"Action",platform:"iOS / Android",status:"release",emoji:"⚡"},{name:"Drift Protocol",genre:"Racing",platform:"iOS",status:"demo",emoji:"🌀"}]},
  {id:3,company:"StarForge Interactive",booth:"P03",boothType:"Pod",genres:["Strategy"],platforms:["PC"],seeking:["Publisher"],mainGame:"Galactic Dominion",gameCount:2,color:"#0ea5e9",desc:"StarForge Interactive crafts grand-scale strategy experiences from their studio in Warsaw. Their flagship title combines 4X mechanics with real-time tactical combat, targeting the PC strategy market.",games:[{name:"Galactic Dominion",genre:"4X Strategy",platform:"PC",status:"demo",emoji:"🌌"},{name:"Ironfront Command",genre:"RTS",platform:"PC",status:"alpha",emoji:"🏰"}]},
  {id:4,company:"DreamByte Entertainment",booth:"B04",boothType:"Standard Booth",genres:["Casual"],platforms:["Mobile"],seeking:["Investment"],mainGame:"Blossom Garden",gameCount:2,color:"#22c55e",desc:"DreamByte creates cozy, accessible mobile games with strong retention mechanics. Their match-3 titles have accumulated over 20M downloads. Seeking Series A investment to scale their live-ops team.",games:[{name:"Blossom Garden",genre:"Puzzle / Casual",platform:"iOS / Android",status:"release",emoji:"🌸"},{name:"Cozy Cove",genre:"Simulation",platform:"iOS / Android",status:"demo",emoji:"🏡"}]},
  {id:5,company:"Iron Pulse Games",booth:"P05",boothType:"Pod",genres:["FPS"],platforms:["PC","Console"],seeking:["Co-dev","Publisher"],mainGame:"Warzone Echo",gameCount:2,color:"#ef4444",desc:"Iron Pulse is a veteran-led studio in Toronto focused on tactical FPS with authentic military simulation. Their engine tech for destructible environments is proprietary and licensable.",games:[{name:"Warzone Echo",genre:"Tactical FPS",platform:"PC / PS5 / Xbox",status:"alpha",emoji:"🎯"},{name:"Echo Protocol",genre:"FPS",platform:"PC",status:"demo",emoji:"🔫"}]},
  {id:6,company:"Mystic Valley Studio",booth:"B06",boothType:"Standard Booth",genres:["Adventure"],platforms:["PC"],seeking:["Investment"],mainGame:"Verdant Hollow",gameCount:2,color:"#84cc16",desc:"Mystic Valley Studio blends hand-painted visuals with atmospheric storytelling. Their debut Verdant Hollow was nominated for Best Art Direction at DevGAMM 2025. Seeking investment to expand their team.",games:[{name:"Verdant Hollow",genre:"Adventure",platform:"PC / Mac",status:"release",emoji:"🌿"},{name:"The Hollow Returns",genre:"Adventure",platform:"PC",status:"alpha",emoji:"🍂"}]},
  {id:7,company:"CyberNest Interactive",booth:"P07",boothType:"Pod",genres:["MMO"],platforms:["PC"],seeking:["Publisher","Co-dev"],mainGame:"Nexus Online",gameCount:3,color:"#8b5cf6",desc:"CyberNest Interactive is building the next generation of browser-accessible MMORPG experiences with cross-platform cloud rendering. Based in Taipei, team of 40 with 200+ years combined experience.",games:[{name:"Nexus Online",genre:"MMORPG",platform:"PC / Browser",status:"alpha",emoji:"🌐"},{name:"CyberNest Mobile",genre:"MMO Lite",platform:"iOS / Android",status:"demo",emoji:"📱"},{name:"Nexus Arena",genre:"PvP",platform:"PC",status:"alpha",emoji:"⚔️"}]},
  {id:8,company:"Aurora Game Works",booth:"B08",boothType:"Standard Booth",genres:["Puzzle"],platforms:["Mobile","PC"],seeking:["Investment"],mainGame:"Prismatic",gameCount:2,color:"#06b6d4",desc:"Aurora Game Works creates mind-bending puzzle games that bridge mobile and PC audiences. Their spatial puzzle mechanics use AR depth sensing. Looking for growth investment after successful crowdfunding.",games:[{name:"Prismatic",genre:"Puzzle",platform:"iOS / Android / PC",status:"release",emoji:"🔷"},{name:"Prismatic II",genre:"Puzzle",platform:"PC / Mac",status:"demo",emoji:"💎"}]},
  {id:9,company:"Phantom Ridge Studio",booth:"P09",boothType:"Pod",genres:["Horror"],platforms:["PC","Console"],seeking:["Publisher"],mainGame:"Veil of Silence",gameCount:2,color:"#475569",desc:"Phantom Ridge Studio creates psychologically disturbing survival horror experiences. Based in Kraków, their games have won multiple horror game awards. Looking for a publisher for global launch.",games:[{name:"Veil of Silence",genre:"Survival Horror",platform:"PC / PS5",status:"demo",emoji:"👁️"},{name:"The Last Witness",genre:"Horror",platform:"PC",status:"release",emoji:"🕯️"}]},
  {id:10,company:"Vertex Play",booth:"B10",boothType:"Standard Booth",genres:["Sports"],platforms:["Mobile"],seeking:["Co-dev"],mainGame:"Hyper Football",gameCount:3,color:"#f97316",desc:"Vertex Play specialises in physics-based mobile sports games with a strong esports community angle. Hyper Football has 3M active players. Seeking co-dev partners to expand into basketball and tennis.",games:[{name:"Hyper Football",genre:"Sports",platform:"iOS / Android",status:"release",emoji:"⚽"},{name:"Hyper Basketball",genre:"Sports",platform:"iOS / Android",status:"alpha",emoji:"🏀"},{name:"Court Clash",genre:"Sports",platform:"iOS",status:"demo",emoji:"🎾"}]},
  {id:11,company:"Eclipse Interactive",booth:"P11",boothType:"Pod",genres:["Simulation"],platforms:["PC"],seeking:["Publisher","Investment"],mainGame:"City Architect Pro",gameCount:2,color:"#d97706",desc:"Eclipse Interactive builds hardcore simulation titles with a passionate niche community. City Architect Pro has sold 600K copies on Early Access. Ready for full launch and console expansion.",games:[{name:"City Architect Pro",genre:"City Builder",platform:"PC",status:"release",emoji:"🏙️"},{name:"Transit Empire",genre:"Simulation",platform:"PC / Mac",status:"alpha",emoji:"🚇"}]},
  {id:12,company:"Radiant Forge Games",booth:"B12",boothType:"Standard Booth",genres:["Fighting"],platforms:["Console"],seeking:["Co-dev"],mainGame:"Iron Clash",gameCount:2,color:"#dc2626",desc:"Radiant Forge Games is a fighting game specialist studio in Montreal with deep roots in the competitive FGC scene. Iron Clash features rollback netcode. Seeking a co-dev partner for cross-platform porting.",games:[{name:"Iron Clash",genre:"Fighting",platform:"PS5 / Xbox Series",status:"demo",emoji:"🥊"},{name:"Clash Origins",genre:"Fighting",platform:"PS4 / Xbox One",status:"release",emoji:"👊"}]}
];

let filtered = [...EXHIBITORS];
let activeExhibitor = null;
let favs = new Set();
let currentView = 'list';
let activeFilter = 'all';
let searchQuery = '';

function initials(name){return name.split(' ').map(w=>w[0]).slice(0,2).join('');}
function platformIcons(platforms){return platforms.map(p=>({PC:'🖥️',Mobile:'📱',Console:'🎮'}[p]||'')).join('');}
function boothCls(ex){return ex.boothType==='Pod'?'booth-pod':'booth-standard';}
function statusCls(s){return {alpha:'status-alpha',demo:'status-demo',release:'status-release'}[s]||'status-alpha';}
function statusLabel(s){return {alpha:'Alpha',demo:'Demo',release:'Released'}[s]||s;}
function seekTagCls(s){return {Publisher:'tag-publisher',Investment:'tag-investment','Co-dev':'tag-codev',Porting:'tag-porting'}[s]||'';}

function applyFilters(){
  filtered = EXHIBITORS.filter(ex=>{
    const q = searchQuery.toLowerCase();
    if(q){const hay=(ex.company+' '+ex.games.map(g=>g.name).join(' ')).toLowerCase();if(!hay.includes(q))return false;}
    if(activeFilter!=='all'&&!ex.seeking.includes(activeFilter))return false;
    return true;
  });
  renderList();
  if(currentView==='map') renderFloorMap(null);
  const countText = `${filtered.length} project${filtered.length!==1?'s':''}`;
  document.getElementById('countLabel').textContent = countText;
  document.getElementById('tb-count').textContent = countText;
}

function renderList(){
  const container = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');
  if(filtered.length===0){container.innerHTML='';empty.classList.add('show');return;}
  empty.classList.remove('show');
  container.innerHTML = filtered.map(ex=>`
    <div class="ex-card" id="excard-${ex.id}" onclick="toggleExpand(event,${ex.id})">
      <div class="ex-head">
        <div class="ex-avatar" style="background:${ex.color}">${initials(ex.company)}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.company}</div>
          <div class="ex-game">🎮 ${ex.mainGame} · ${ex.gameCount} game${ex.gameCount>1?'s':''}</div>
        </div>
        <div class="ex-right">
          <span class="ex-booth ${boothCls(ex)}">${ex.booth}</span>
        </div>
      </div>
      <div class="ex-tags">
        ${ex.seeking.map(s=>`<span class="ex-tag ${seekTagCls(s)}">${s}</span>`).join('')}
        <span class="ex-platform">${platformIcons(ex.platforms)}</span>
      </div>
      <div class="ex-actions">
        <button class="ex-btn ex-btn-meet" onclick="event.stopPropagation();openSheet(${ex.id})">🤝 Meet</button>
        <button class="ex-btn ex-btn-view" onclick="event.stopPropagation();openSheet(${ex.id})">View Booth</button>
        <span class="ex-expand-toggle">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
      <div class="ex-detail" id="exdetail-${ex.id}">
        <div class="ex-detail-label">About</div>
        <div class="ex-detail-desc">${ex.desc}</div>
        <div class="ex-detail-label">Games</div>
        <div class="ex-games-list">
          ${ex.games.map(g=>`
            <div class="ex-game-item">
              <span class="ex-game-emoji">${g.emoji}</span>
              <div class="ex-game-info">
                <div class="ex-game-name">${g.name}</div>
                <div class="ex-game-meta">${g.genre} · ${g.platform}</div>
              </div>
              <span class="ex-game-status ${statusCls(g.status)}">${statusLabel(g.status)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleExpand(event, id){
  if(event.target.closest('.ex-btn')) return;
  const card = document.getElementById(`excard-${id}`);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.ex-card.open').forEach(c=>c.classList.remove('open'));
  if(!isOpen){
    card.classList.add('open');
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
}

// ── FLOOR MAP ──
const BOOTH_POSITIONS = [
  {booth:'P01',x:10,y:20,w:52,h:48,type:'pod'},{booth:'P03',x:68,y:20,w:52,h:48,type:'pod'},
  {booth:'P05',x:126,y:20,w:52,h:48,type:'pod'},{booth:'P07',x:184,y:20,w:52,h:48,type:'pod'},
  {booth:'P09',x:242,y:20,w:52,h:48,type:'pod'},{booth:'P11',x:300,y:20,w:50,h:48,type:'pod'},
  {booth:'B02',x:10,y:130,w:78,h:68,type:'booth'},{booth:'B04',x:94,y:130,w:78,h:68,type:'booth'},
  {booth:'B06',x:178,y:130,w:78,h:68,type:'booth'},{booth:'B08',x:262,y:130,w:88,h:68,type:'booth'},
  {booth:'B10',x:10,y:208,w:78,h:68,type:'booth'},{booth:'B12',x:94,y:208,w:78,h:68,type:'booth'},
];

function renderFloorMap(activeBooth){
  const svg = document.getElementById('floorMapSvg');
  let html = `<rect width="360" height="320" fill="#f8f5ef"/><rect x="0" y="80" width="360" height="38" fill="#ede9e0"/><text x="180" y="103" text-anchor="middle" font-size="9" fill="#9c9085" font-family="DM Sans,sans-serif" letter-spacing="1">— MAIN AISLE —</text><text x="8" y="14" font-size="9" fill="#9c9085" font-family="DM Sans,sans-serif">PODS</text><text x="8" y="126" font-size="9" fill="#9c9085" font-family="DM Sans,sans-serif">BOOTHS</text>`;
  for(const pos of BOOTH_POSITIONS){
    const isActive = pos.booth===activeBooth;
    const inFilter = filtered.some(e=>e.booth===pos.booth);
    const fill = isActive?'#d95f2b':pos.type==='pod'?'#d6e8f8':'#f0e2d0';
    const stroke = isActive?'#b84e22':pos.type==='pod'?'#1a6fa8':'#9a5b1c';
    const textColor = isActive?'#fff':pos.type==='pod'?'#1a6fa8':'#9a5b1c';
    const opacity = (!activeBooth&&!inFilter)?'0.4':'1';
    html+=`<g style="cursor:pointer" onclick="handleMapClick('${pos.booth}')" opacity="${opacity}"><rect x="${pos.x}" y="${pos.y}" width="${pos.w}" height="${pos.h}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="${isActive?2.5:1.5}"/><text x="${pos.x+pos.w/2}" y="${pos.y+pos.h/2+4}" text-anchor="middle" font-size="10" font-weight="${isActive?'700':'600'}" fill="${textColor}" font-family="DM Sans,sans-serif">${pos.booth}</text>${isActive?`<circle cx="${pos.x+pos.w/2}" cy="${pos.y+9}" r="4" fill="#fff"/>`:''}`;
    html+=`</g>`;
  }
  svg.innerHTML = html;
}

function handleMapClick(booth){
  const ex = EXHIBITORS.find(e=>e.booth===booth);
  if(ex) openSheet(ex.id);
}

function switchView(view){
  currentView = view;
  document.getElementById('toggleList').classList.toggle('active',view==='list');
  document.getElementById('toggleMap').classList.toggle('active',view==='map');
  document.getElementById('cardList').style.display = view==='list'?'flex':'none';
  document.getElementById('emptyState').style.display = view==='map'?'none':'';
  document.getElementById('mapView').classList.toggle('show',view==='map');
  document.querySelector('.section-header').style.display = view==='map'?'none':'flex';
  if(view==='map') renderFloorMap(activeExhibitor?activeExhibitor.booth:null);
}

// ── SHEET ──
function openSheet(id){
  const ex = EXHIBITORS.find(e=>e.id===id);
  if(!ex) return;
  activeExhibitor = ex;
  document.getElementById('sheetAvatar').textContent = initials(ex.company);
  document.getElementById('sheetAvatar').style.background = ex.color;
  document.getElementById('sheetName').textContent = ex.company;
  const boothBadge = `<span class="ex-booth ${boothCls(ex)}">${ex.booth} · ${ex.boothType}</span>`;
  const seekTags = ex.seeking.map(s=>`<span class="ex-tag ${seekTagCls(s)}">${s}</span>`).join('');
  document.getElementById('sheetMeta').innerHTML = boothBadge + seekTags;
  document.getElementById('sheetDesc').textContent = ex.desc;
  document.getElementById('sheetGames').innerHTML = ex.games.map(g=>`
    <div class="sheet-game-item">
      <span class="sheet-game-emoji">${g.emoji}</span>
      <div class="sheet-game-info">
        <div class="sheet-game-name">${g.name}</div>
        <div class="sheet-game-meta">${g.genre} · ${g.platform}</div>
      </div>
      <span class="ex-game-status ${statusCls(g.status)}">${statusLabel(g.status)}</span>
    </div>
  `).join('');
  const sfFav = document.getElementById('sfFav');
  sfFav.textContent = favs.has(id)?'❤️':'🤍';
  sfFav.classList.toggle('active',favs.has(id));
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('sheetFooter').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeSheetDirect(){
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetFooter').classList.remove('visible');
  document.body.style.overflow = '';
  activeExhibitor = null;
}

function closeSheet(event){
  if(event.target===document.getElementById('sheetOverlay')) closeSheetDirect();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheetDirect();});

function toggleFav(){
  if(!activeExhibitor) return;
  const id = activeExhibitor.id;
  const btn = document.getElementById('sfFav');
  if(favs.has(id)){favs.delete(id);btn.textContent='🤍';btn.classList.remove('active');showToast('Removed from saved');}
  else{favs.add(id);btn.textContent='❤️';btn.classList.add('active');showToast('Saved ❤️');}
}

function bookMeeting(){
  if(!activeExhibitor) return;
  showToast(`Opening Let's Meet for ${activeExhibitor.company}…`);
}

// ── FILTER ──
document.getElementById('filterRow').addEventListener('click',e=>{
  const btn = e.target.closest('.ftag');
  if(!btn) return;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  applyFilters();
});

// ── SEARCH ──
document.getElementById('searchToggle').addEventListener('click',()=>{
  const wrap = document.getElementById('searchWrap');
  wrap.classList.toggle('show');
  if(wrap.classList.contains('show')) document.getElementById('searchInput').focus();
});
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input',()=>{
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle('visible',searchQuery.length>0);
  applyFilters();
});
searchClear.addEventListener('click',()=>{
  searchInput.value='';searchQuery='';
  searchClear.classList.remove('visible');
  applyFilters();
  searchInput.focus();
});

// ── TOAST ──
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──
renderList();
renderFloorMap(null);
</script>
