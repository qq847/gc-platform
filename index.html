<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=EventHub_v2_PC.html">
<title>Game Connection Platform</title>
</head>
<body>

<!-- ── SPLASH SCREEN ── -->
<div id="gc-splash" style="
  position:fixed;inset:0;z-index:99999;
  background:#f3f2ef;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:32px;
  transition:opacity .35s ease;
">
  <img src="assets/gc-logo.png" alt="Game Connection" style="height:52px;width:auto;display:block">
  <div style="width:220px;height:3px;background:rgba(0,0,0,0.12);border-radius:2px;overflow:hidden">
    <div id="gc-splash-bar" style="
      height:100%;width:0%;background:#16a34a;
      border-radius:2px;
      transition:width .08s linear;
    "></div>
  </div>
</div>
<script>
(function(){
  var splash = document.getElementById('gc-splash');
  var bar = document.getElementById('gc-splash-bar');
  var pct = 0;
  var fast = setInterval(function(){
    pct += (pct < 70 ? 3 : 0.8);
    if(pct >= 92){ clearInterval(fast); }
    bar.style.width = Math.min(pct,92) + '%';
  }, 40);
  function finish(){
    clearInterval(fast);
    bar.style.transition = 'width .25s ease';
    bar.style.width = '100%';
    setTimeout(function(){
      splash.style.opacity = '0';
      setTimeout(function(){ splash.style.display='none'; }, 360);
    }, 260);
  }
  if(document.readyState === 'complete'){
    finish();
  } else {
    window.addEventListener('load', finish);
    setTimeout(finish, 4000);
  }
})();
</script>

<script>window.location.replace('EventHub_v2_PC.html');</script>
</body>
</html>
