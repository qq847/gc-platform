<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Connection – Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #d95f2b;
    --orange-light: #f4875a;
    --orange-pale: #fde8dc;
    --teal: #0a7fa8;
    --teal-light: #1aa3d1;
    --teal-pale: #d6f0f8;
    --green: #0d9b72;
    --green-light: #15c492;
    --green-pale: #d1f5eb;
    --bg: #e8e4da;
    --bg-card: #ffffff;
    --bg-input: #f4f1eb;
    --text-primary: #1a1a1a;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: #dedad2;
    --red: #e53935;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    --radius: 14px;
    --topbar-h: 56px;
    --searchbar-h: 52px;
    --chips-h: 48px;
    --tabbar-h: 64px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #c8c4ba;
    color: var(--text-primary);
    overscroll-behavior: none;
  }

  /* ── APP SHELL ─────────────────────────────────────── */
  #app {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
    height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.25);
  }

  /* ── TOP NAV ────────────────────────────────────────── */
  #topnav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--topbar-h);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--orange) 0%, #b8451c 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .logo-text span:first-child {
    font-weight: 700;
    font-size: 13px;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }
  .logo-text span:last-child {
    font-weight: 500;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .topnav-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border: none;
    background: transparent;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    font-size: 20px;
    color: var(--text-secondary);
  }
  .icon-btn:active { background: var(--bg-input); }
  .notif-dot {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid #fff;
  }

  /* ── SCROLL CONTAINER ───────────────────────────────── */
  #scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
  }
  #scroll-area::-webkit-scrollbar { display: none; }

  /* ── STICKY SUBHEADER (search + chips) ──────────────── */
  #subheader {
    position: sticky;
    top: 0;
    z-index: 90;
    background: var(--bg);
  }

  /* ── SEARCH BAR ─────────────────────────────────────── */
  #searchbar {
    height: var(--searchbar-h);
    padding: 8px 16px;
    background: var(--bg);
  }
  .search-wrap {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 14px;
    height: 36px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .search-wrap:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(10,127,168,0.12);
  }
  .search-wrap svg { flex-shrink: 0; color: var(--text-muted); }
  .search-wrap input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: transparent;
    color: var(--text-primary);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }

  /* ── FILTER CHIPS ───────────────────────────────────── */
  #chips {
    height: var(--chips-h);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    user-select: none;
  }
  .chip.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .chip:active { transform: scale(0.95); }

  /* ── PULL TO REFRESH ────────────────────────────────── */
  #ptr {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 0;
    overflow: hidden;
    transition: height 0.3s;
    color: var(--text-muted);
    font-size: 13px;
    gap: 6px;
  }
  #ptr.visible { height: 44px; }
  .ptr-spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FEED ───────────────────────────────────────────── */
  #feed {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── LIVE NOW BANNER ────────────────────────────────── */
  .live-banner {
    background: linear-gradient(135deg, #1a0a00 0%, #3d1200 30%, #7a2200 60%, #b83a00 100%);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(217,95,43,0.35);
  }
  .live-banner:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(217,95,43,0.25); }
  .live-banner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,100,0,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  .live-banner::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(255,160,0,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  .live-title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    position: relative;
    z-index: 1;
    margin-bottom: 4px;
  }
  .live-subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    position: relative;
    z-index: 1;
    margin-bottom: 14px;
  }
  .live-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--orange);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: background 0.15s;
  }
  .live-btn:active { background: var(--orange-light); }
  .live-stats {
    position: absolute;
    right: 20px;
    bottom: 18px;
    z-index: 1;
    text-align: right;
  }
  .live-stats .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .live-stats .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── SECTION LABEL ──────────────────────────────────── */
  .section-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0 2px;
  }
  .section-label h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .section-label a {
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
    text-decoration: none;
  }

  /* ── CARD BASE ──────────────────────────────────────── */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }

  /* ── EVENT CARD ─────────────────────────────────────── */
  .event-cover {
    height: 120px;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 12px;
  }
  .event-cover-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-live { background: var(--red); color: #fff; }
  .badge-soon { background: var(--orange); color: #fff; }
  .badge-upcoming { background: rgba(0,0,0,0.45); color: #fff; }
  .event-body { padding: 14px 16px; }
  .event-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 5px;
    line-height: 1.2;
  }
  .event-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .event-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .event-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 10px;
  }
  .exhibitor-count {
    font-size: 12px;
    color: var(--text-muted);
  }
  .exhibitor-count span {
    font-weight: 700;
    color: var(--text-primary);
  }
  .view-btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* ── NEWS CARD ──────────────────────────────────────── */
  .news-body { padding: 14px 16px; }
  .news-source {
    font-size: 11px;
    font-weight: 600;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
  }
  .news-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .news-excerpt {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .news-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .news-time {
    font-size: 11px;
    color: var(--text-muted);
  }
  .news-tags {
    display: flex;
    gap: 5px;
  }
  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg-input);
    color: var(--text-secondary);
  }
  .tag-orange { background: var(--orange-pale); color: var(--orange); }
  .tag-teal { background: var(--teal-pale); color: var(--teal); }
  .tag-green { background: var(--green-pale); color: var(--green); }

  /* ── GAME CARD ──────────────────────────────────────── */
  .game-card-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
  }
  .game-cover {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    position: relative;
    overflow: hidden;
  }
  .game-cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .game-info { flex: 1; min-width: 0; }
  .game-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .game-dev {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .game-meta-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .platform-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg-input);
    color: var(--text-secondary);
  }
  .release-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--green-pale);
    color: var(--green);
  }
  .game-arrow {
    color: var(--text-muted);
    font-size: 18px;
  }

  /* ── LOAD MORE ──────────────────────────────────────── */
  #load-more-wrap {
    padding: 4px 16px 20px;
  }
  #load-more-btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius);
    border: 2px solid var(--orange);
    background: transparent;
    color: var(--orange);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  #load-more-btn:active { background: var(--orange); color: #fff; }
  #load-more-btn.loading { opacity: 0.6; pointer-events: none; }

  /* ── BOTTOM TAB BAR ─────────────────────────────────── */
  #tabbar {
    height: var(--tabbar-h);
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0 8px;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 8px 4px;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.15s;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:active { background: var(--bg-input); }
  .tab-icon { font-size: 20px; line-height: 1; }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.2px;
  }
  .tab.active .tab-label { color: var(--orange); font-weight: 700; }
  .tab.active .tab-icon { filter: none; }

  /* ── NEWSLETTER BANNER ──────────────────────────────── */
  #newsletter-card {
    background: linear-gradient(135deg, var(--teal) 0%, #065e80 100%);
    border-radius: var(--radius);
    padding: 18px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  #newsletter-card::before {
    content: '📧';
    position: absolute;
    right: -8px; top: -8px;
    font-size: 64px;
    opacity: 0.12;
    transform: rotate(15deg);
  }
  .newsletter-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .newsletter-sub {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .newsletter-form {
    display: flex;
    gap: 8px;
  }
  .newsletter-input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .newsletter-input::placeholder { color: rgba(255,255,255,0.55); }
  .newsletter-input:focus { background: rgba(255,255,255,0.25); }
  .newsletter-submit {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: var(--teal);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .newsletter-submit:active { opacity: 0.8; }

  /* ── TOAST ──────────────────────────────────────────── */
  #toast {
    position: absolute;
    bottom: calc(var(--tabbar-h) + 12px);
    left: 16px;
    right: 16px;
    background: #1a1a1a;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── EMPTY STATE ────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

/* ═══ UNIFIED BOTTOM NAV ═══ */
.gc-bnav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #e5e7eb;display:flex;align-items:flex-start;padding-top:6px;z-index:9999;max-width:480px;margin:0 auto;}
.gc-bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:2px 0;text-decoration:none;color:inherit;}
.gc-bn-i{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.gc-bn-l{font-size:9px;font-weight:600;color:#9ca3af;letter-spacing:.2px;text-transform:uppercase;}
.gc-bn.active .gc-bn-l{color:#e85d26;}
.gc-bn.active .gc-bn-i svg{stroke:#e85d26 !important;}
.gc-bn:hover .gc-bn-l{color:#e85d26;}
.gc-page-content{padding-bottom:64px;}

</style>

      </button>

  </div><!-- /scroll-area -->

  <!-- BOTTOM TAB BAR -->

  <!-- TOAST -->
  <div id="toast"></div>

</div><!-- /app -->

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────

const feedData = [

  },
  {

    dates: 'Apr 15–18, 2026',
    location: 'Singapore',
    exhibitors: 280,
    status: 'upcoming',
    gradient: 'linear-gradient(135deg, #064a8c 0%, #0a7fa8 60%, #15b8d4 100%)',

  },
  {

  },
  {

  },
  {

  },
  {

    excerpt: 'Rockstar Games confirmed in an investor call that Grand Theft Auto VI is targeting a Holiday 2026 window, with pre-release promotional campaigns expected to begin this summer.',
    time: '5h ago',
    tags: [{label:'Rockstar', cls:'tag-orange'}, {label:'AAA', cls:''}],
    category: ['news']
  },
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let searchQuery = '';
let visibleCount = 12;
let toastTimer = null;

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = getFilteredData();
  const visible = filtered.slice(0, visibleCount);
  
  if (visible.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🔍</div>
        <p>No results found.<br>Try a different filter or search term.</p>
      </div>`;
    document.getElementById('load-more-wrap').style.display = 'none';
    return;
  }

  document.getElementById('load-more-wrap').style.display = 'block';
  feed.innerHTML = visible.map(item => renderCard(item)).join('');
  
  const lmBtn = document.getElementById('load-more-btn');
  if (visibleCount >= filtered.length) {
    document.getElementById('load-more-wrap').style.display = 'none';
  } else {
    document.getElementById('load-more-wrap').style.display = 'block';
  }
}

function getFilteredData() {
  return feedData.filter(item => {
    if (item.type === 'live-banner') return currentFilter === 'all' || currentFilter === 'live';
    if (item.type === 'newsletter') return currentFilter === 'all';
    const matchFilter = currentFilter === 'all' || (item.category && item.category.includes(currentFilter));
    const matchSearch = !searchQuery || 
      (item.title && item.title.toLowerCase().includes(searchQuery)) ||
      (item.name && item.name.toLowerCase().includes(searchQuery)) ||
      (item.source && item.source.toLowerCase().includes(searchQuery)) ||
      (item.dev && item.dev.toLowerCase().includes(searchQuery)) ||
      (item.location && item.location.toLowerCase().includes(searchQuery));
    return matchFilter && matchSearch;
  });
}

function renderCard(item) {
  switch(item.type) {
    case 'live-banner': return renderLiveBanner();
    case 'event': return renderEventCard(item);
    case 'news': return renderNewsCard(item);
    case 'game': return renderGameCard(item);
    case 'newsletter': return renderNewsletter();
    default: return '';
  }
}

function renderLiveBanner() {
  return `
    <div class="live-banner" onclick="showToast('🔴 Opening Live Guide…')">
      <div class="live-badge"><span class="live-dot"></span>LIVE NOW</div>
      <div class="live-title">Game Connection Live 2026</div>
      <div class="live-subtitle">🗺️ Helsinki & Tallinn  ·  Mar 29 – Apr 3</div>
      <button class="live-btn" onclick="event.stopPropagation(); showToast('📖 Opening Live Guide…')">
        Open Live Guide
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <div class="live-stats">
        <div class="stat-num">420+</div>
        <div class="stat-label">Companies</div>
      </div>
    </div>`;
}

function renderEventCard(item) {
  const badgeClass = item.status === 'live' ? 'badge-live' : item.status === 'soon' ? 'badge-soon' : 'badge-upcoming';
  return `
    <div class="card" onclick="showToast('📅 Opening ${item.name}…')">
      <div class="event-cover" style="background: ${item.gradient}">
        <div class="event-cover-badge ${badgeClass}">${item.tag}</div>
      </div>
      <div class="event-body">
        <div class="event-name">${item.name}</div>
        <div class="event-meta">
          <div class="event-meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>${item.dates}</span>
          </div>
          <div class="event-meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>${item.location}</span>
          </div>
        </div>
        <div class="event-footer">
          <div class="exhibitor-count"><span>${item.exhibitors}+</span> companies attending</div>
          <div class="view-btn">View
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>
    </div>`;
}

function renderNewsCard(item) {
  const tagsHtml = item.tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join('');
  return `
    <div class="card" onclick="showToast('📰 Opening article…')">
      <div class="news-body">
        <div class="news-source">${item.source}</div>
        <div class="news-title">${item.title}</div>
        <div class="news-excerpt">${item.excerpt}</div>
        <div class="news-footer">
          <div class="news-time">${item.time}</div>
          <div class="news-tags">${tagsHtml}</div>
        </div>
      </div>
    </div>`;
}

function renderGameCard(item) {
  return `
    <div class="card" onclick="showToast('🎮 Opening ${item.name}…')">
      <div class="game-card-inner">
        <div class="game-cover" style="background: ${item.bg}">${item.emoji}</div>
        <div class="game-info">
          <div class="game-name">${item.name}</div>
          <div class="game-dev">${item.dev}</div>
          <div class="game-meta-row">
            <span class="platform-tag">${item.platforms}</span>
            <span class="release-tag">${item.release}</span>
          </div>
        </div>
        <div class="game-arrow">›</div>
      </div>
    </div>`;
}

function renderNewsletter() {
  return `
    <div id="newsletter-card">
      <div class="newsletter-title">📧 Stay in the Loop</div>
      <div class="newsletter-sub">Get weekly updates on games, events &amp; industry news delivered to your inbox.</div>
      <div class="newsletter-form">
        <input type="email" class="newsletter-input" placeholder="your@email.com" id="nlEmail">
        <button class="newsletter-submit" onclick="subscribeNewsletter()">Subscribe</button>
      </div>
    </div>`;
}

// ─── INTERACTIONS ───────────────────────────────────────────────────────────

function filterChip(el, filter) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  visibleCount = 12;
  renderFeed();
  // Scroll back to top of feed
  document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
}

let searchDebounce = null;
function handleSearch(val) {
  clearTimeout(searchDebounce);
  searchQuery = val.toLowerCase().trim();
  searchDebounce = setTimeout(() => {
    visibleCount = 12;
    renderFeed();
  }, 250);
}

function loadMore() {
  const btn = document.getElementById('load-more-btn');
  const txt = document.getElementById('lm-text');
  const icon = document.getElementById('lm-icon');
  btn.classList.add('loading');
  txt.textContent = 'Loading…';
  icon.style.display = 'none';
  setTimeout(() => {
    visibleCount += 6;
    renderFeed();
    btn.classList.remove('loading');
    txt.textContent = 'Load more';
    icon.style.display = '';
  }, 800);
}

function subscribeNewsletter() {
  const email = document.getElementById('nlEmail');
  if (!email) return;
  const val = email.value.trim();
  if (!val || !val.includes('@')) {
    showToast('⚠️ Please enter a valid email address');
    return;
  }
  email.value = '';
  showToast('✅ Subscribed! Check your inbox soon.');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ─── PULL-TO-REFRESH (decorative) ─────────────────────────────────────────
(function() {
  const sa = document.getElementById('scroll-area');
  const ptr = document.getElementById('ptr');
  let startY = 0;
  let pulling = false;
  let refreshing = false;

  sa.addEventListener('touchstart', e => {
    if (sa.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  sa.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 60) {
      ptr.classList.add('visible');
    }
  }, { passive: true });

  sa.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    if (ptr.classList.contains('visible')) {
      refreshing = true;
      setTimeout(() => {
        ptr.classList.remove('visible');
        refreshing = false;
        showToast('✅ Feed refreshed');
      }, 1200);
    }
  });
})();

// ─── INIT ──────────────────────────────────────────────────────────────────
renderFeed();
</script>
