<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Game Connection — Conference Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#e8e4da;font-family:"DM Sans","PingFang SC",sans-serif;color:#1c1a17}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#e8e4da;padding-bottom:80px}

:root{
  --teal:#0a7fa8;--teal-dim:rgba(10,127,168,0.1);--teal-border:rgba(10,127,168,0.22);
  --green:#0d9b72;--green-dim:rgba(13,155,114,0.1);--green-border:rgba(13,155,114,0.25);
  --orange:#d95f2b;--orange-dim:rgba(217,95,43,0.1);--orange-border:rgba(217,95,43,0.25);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,0.1);--purple-border:rgba(124,58,237,0.25);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,0.1);--blue-border:rgba(37,99,235,0.25);
  --red:#dc2626;--red-dim:rgba(220,38,38,0.1);--red-border:rgba(220,38,38,0.3);
  --card:#fff;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.05);
  --text1:#1c1a17;--text2:#6b6660;--text3:#a09890;
  --s1:0 1px 3px rgba(0,0,0,0.07),0 0 1px rgba(0,0,0,0.04);
  --s2:0 2px 8px rgba(0,0,0,0.1),0 1px 2px rgba(0,0,0,0.06);
}

/* ── TOP BAR (single row) ── */
.topbar{
  background:rgba(232,228,218,0.97);padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.tb-back{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.tb-meta{flex:1;display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;}
.tb-count{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;}
.tb-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.tb-countries{font-size:12px;color:var(--text2);white-space:nowrap;}
.tb-saved-btn{
  display:flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:11px;font-weight:700;color:var(--text2);
  cursor:pointer;flex-shrink:0;font-family:inherit;
  box-shadow:var(--s1);transition:all .15s;
}
.tb-saved-btn.on{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange);}
.tb-notif{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;}
.tb-notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #e8e4da;}

/* ── FILTER ROW: [year▾] [month▾] | tags (multi-select) ── */
.filter-row{display:flex;gap:6px;padding:10px 14px 10px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.filter-row::-webkit-scrollbar{display:none}
/* Dropdown pill */
.dpill{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:6px 10px 6px 12px;border-radius:20px;
  border:1.5px solid rgba(0,0,0,0.12);background:var(--card);
  font-size:11px;font-weight:700;color:var(--text1);
  cursor:pointer;box-shadow:var(--s1);white-space:nowrap;
  position:relative;font-family:inherit;transition:all .15s;
}
.dpill.open{border-color:rgba(0,0,0,0.25);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
/* Dropdown popover */
.dpop{
  display:none;position:fixed;
  background:#fff;border-radius:12px;
  border:1px solid rgba(0,0,0,0.09);
  box-shadow:0 8px 24px rgba(0,0,0,0.14);
  padding:8px;z-index:9000;
  max-height:80vh;overflow-y:auto;
}
.dpop.visible{display:block;}
/* Year popover */
.dpop-years{display:flex;flex-direction:column;gap:3px;min-width:88px;}
.dpop-y{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;transition:background .1s;}
.dpop-y:hover{background:rgba(0,0,0,0.05);}
.dpop-y.active{background:var(--text1);color:#fff;}
/* Month popover */
.dpop-months{display:flex;flex-direction:column;gap:2px;min-width:130px;}
.dpop-m{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .1s;}
.dpop-m:hover{background:rgba(0,0,0,0.05);}
.dpop-m.has{color:var(--text1);}
.dpop-m.has .dpop-m-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.dpop-m.active{background:var(--text1);color:#fff;}
.dpop-m.active .dpop-m-dot{background:rgba(255,255,255,0.7);}
.dpop-m.nodata{color:var(--text3);cursor:default;}
/* Filter divider */
.filter-div{flex-shrink:0;width:1px;height:18px;background:rgba(0,0,0,0.1);margin:0 2px;}
/* Tag pill (multi-select) */
.ftag{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.ftag.active{color:#fff;}
.ftag[data-f="B2B"].active{background:var(--teal);border-color:var(--teal);}
.ftag[data-f="Consumer"].active{background:var(--purple);border-color:var(--purple);}
.ftag[data-f="Developer"].active{background:var(--green);border-color:var(--green);}
.ftag[data-f="Asia"].active{background:var(--orange);border-color:var(--orange);}
.ftag[data-f="Europe"].active{background:#2563eb;border-color:#2563eb;}
.ftag[data-f="NorthAmerica"].active{background:#dc2626;border-color:#dc2626;}
.ftag[data-f="platform"].active{background:#f59e0b;border-color:#f59e0b;}
.ftag[data-f="live"].active{background:var(--red);border-color:var(--red);}
/* Clear multi-select */
.clear-ftag{flex-shrink:0;display:none;align-items:center;gap:3px;padding:5px 9px;border-radius:20px;background:rgba(0,0,0,0.06);border:none;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit;}
.clear-ftag.show{display:flex;}

/* ── MONTH GROUP ── */
.month-group{margin-bottom:4px}
.mg-header{padding:10px 14px 6px;display:flex;align-items:center;gap:8px}
.mg-month{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange)}
.mg-year{font-size:11px;color:var(--text3);font-weight:500}
.mg-count{font-size:10px;color:var(--text3);margin-left:auto;background:rgba(0,0,0,0.05);padding:2px 8px;border-radius:10px}

/* ── EVENT CARD ── */
.ev-list-wrap{padding:0 12px;display:flex;flex-direction:column;gap:8px;}
.ev-card{
  background:var(--card);
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.07);
  box-shadow:0 1px 4px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.03);
  overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,transform .1s;
}
.ev-card:active{transform:scale(.99)}
.ev-card.is-platform{border-left:3px solid var(--blue)}
.ev-card.has-live{border-left:3px solid var(--red)}

.ev-head{display:flex;align-items:flex-start;padding:12px 12px 11px;gap:10px;}
.ev-date-box{
  width:44px;flex-shrink:0;
  background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.07);
  border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 4px;text-align:center;
}
.ev-date-box.live-date{background:rgba(220,38,38,0.07);border-color:rgba(220,38,38,0.2);}
.ev-date-day{font-size:16px;font-weight:900;color:var(--text1);line-height:1}
.ev-date-mon{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.ev-main{flex:1;min-width:0}
.ev-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.ev-badge{font-size:8px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.3px}
.eb-b2b{background:var(--teal-dim);border:1px solid var(--teal-border);color:var(--teal)}
.eb-consumer{background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple)}
.eb-dev{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green)}
.eb-online{background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1);color:var(--text2)}
.eb-live{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);animation:pulse-live 1.5s infinite}
.eb-platform{background:var(--blue-dim);border:1px solid var(--blue-border);color:var(--blue)}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.65}}
.ev-name{font-size:14px;font-weight:700;color:var(--text1);line-height:1.3;margin-bottom:4px}
.ev-meta{font-size:11px;color:var(--text2);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ev-loc{display:flex;align-items:center;gap:3px}
.ev-flag{font-size:13px}
.ev-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.ev-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.ev-save{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--text3);transition:all .2s}
.ev-save.on{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange)}
.ev-going{font-size:10px;font-weight:700;color:var(--teal);background:var(--teal-dim);border:1px solid var(--teal-border);border-radius:6px;padding:2px 7px;white-space:nowrap;}

/* ── EXPANDED DETAIL ── */
.ev-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border2)}
.ev-card.open .ev-detail{display:block}
.ev-detail-dates{font-size:12px;color:var(--text2);margin-bottom:8px;margin-top:10px;display:flex;align-items:center;gap:6px}
.ev-detail-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.ev-detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ev-detail-tag{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(0,0,0,0.05);border:1px solid var(--border);color:var(--text2)}
.ev-btns{display:flex;gap:7px;flex-wrap:wrap}
.ev-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:7px 13px;border-radius:8px;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .15s;border:none}
.ev-btn-primary{background:var(--orange);color:#fff}
.ev-btn-primary:hover{opacity:.88}
.ev-btn-platform{background:var(--blue);color:#fff}
.ev-btn-platform:hover{opacity:.88}
.ev-btn-cal{background:var(--teal-dim);border:1px solid var(--teal-border);color:var(--teal)}
.ev-btn-cal:hover{background:rgba(10,127,168,0.18)}
.ev-btn-web{background:rgba(0,0,0,0.05);border:1px solid var(--border);color:var(--text2)}
.ev-btn-going{background:rgba(0,0,0,0.05);border:1px solid var(--border);color:var(--text2)}
.ev-btn-going.on{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.4);color:#16a34a;font-weight:700}
.ev-btn-share{background:rgba(0,0,0,0.05);border:1px solid var(--border);color:var(--text2)}
.ev-btn-share:hover{background:rgba(0,0,0,0.09)}
.ev-btn-web:hover{background:rgba(0,0,0,0.09)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.6}

/* ── STATS STRIP ── */
.stats-strip{
  display:flex;gap:0;margin:0 14px 14px;
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  overflow:hidden;
}
.stat-item{flex:1;text-align:center;padding:12px 6px;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-num{font-size:18px;font-weight:800;color:var(--text1)}
.stat-label{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(232,228,218,0.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 0 22px;
  display:flex;align-items:flex-start;
  z-index:1000;
}
/* legacy nav removed */
.nav-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase}
.nav-item.active .nav-lbl{color:var(--teal)}

/* ── ADD TO CAL SHEET ── */
.cal-sheet{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;
  backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;
}
.cal-sheet.open{display:flex}
.cal-body{
  background:#fff;border-radius:16px 16px 0 0;max-width:480px;width:100%;
  padding:20px 20px 36px;box-shadow:0 -8px 32px rgba(0,0,0,0.15);
}
.cal-drag{width:36px;height:4px;background:#e5e5e5;border-radius:2px;margin:0 auto 18px}
.cal-ev-name{font-size:16px;font-weight:800;color:var(--text1);margin-bottom:4px}
.cal-ev-meta{font-size:12px;color:var(--text2);margin-bottom:18px}
.cal-options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.cal-option{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  border-radius:10px;border:1px solid var(--border);background:#fafaf9;
  cursor:pointer;transition:background .15s;
}
.cal-option:hover{background:#f0ede8}
.cal-opt-icon{font-size:22px;flex-shrink:0}
.cal-opt-label{font-size:13px;font-weight:600;color:var(--text1)}
.cal-opt-sub{font-size:11px;color:var(--text2)}
.cal-cancel{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit}

/* ═══ UNIFIED BOTTOM NAV ═══ */
.gc-bnav{position:fixed;bottom:0;left:0;right:0;height:58px;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;padding:0;z-index:9999;max-width:480px;margin:0 auto;}
.gc-bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:6px 0;text-decoration:none;color:inherit;position:relative;}
.gc-bn-i{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.gc-bn-i svg{stroke:#b0aba3;stroke-width:1.8;transition:stroke .15s;}
.gc-bn-l{font-size:9px;font-weight:600;color:#b0aba3;letter-spacing:.3px;text-transform:uppercase;transition:color .15s;}
.gc-bn.active .gc-bn-l{color:#e85d26;}
.gc-bn.active .gc-bn-i svg{stroke:#e85d26 !important;}
.gc-bn:hover .gc-bn-l{color:#6b6660;}
.gc-bn:hover .gc-bn-i svg{stroke:#6b6660;}
.gc-page-content{padding-bottom:58px;}


/* LOAD MORE */
.load-more-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 12px 16px 24px;
  padding: 14px;
  background: #fff;
  border: 1.5px solid var(--bdr);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--tx2);
  cursor: pointer;
  text-align: center;
  transition: background .15s, color .15s;
}
.load-more-btn:hover { background: var(--bg2); color: var(--tx1); }
.ev-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 48px 16px;
  color: var(--tx3);
  font-size: 13px;
}
.ev-spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--bdr);
  border-top-color: var(--ac);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ev-card.ended { opacity: 0.6; }
.mg-cards { display: flex; flex-direction: column; gap: 8px; }
</style>

</head>
<body>
<div class="app">

<!-- TOP BAR: single row -->
<div class="topbar">

  <div class="tb-meta">
    <span class="tb-count" id="tb-count">48 events</span>
    <div class="tb-dot"></div>
    <span class="tb-countries" id="tb-countries">22 countries</span>
  </div>
  <button class="tb-saved-btn" id="tb-saved-btn" onclick="toggleSavedFilter()">
    <span>&#9733;</span>
    <span id="tb-saved-num">0</span>
  </button>
  <div class="tb-notif">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b6660" stroke-width="2.2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <div class="tb-notif-dot"></div>
  </div>
</div>

<!-- FILTER ROW: [year▾] [month▾] | tags (multi-select) -->
<div class="filter-row" id="filter-row">
  <!-- Year dropdown -->
  <div class="dpill" id="dpill-year" onclick="toggleDrop('year',event)">
    <span id="dpill-year-label">2026</span>
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    <div class="dpop" id="dpop-year">
      <div class="dpop-years" id="dpop-years-list"></div>
    </div>
  </div>
  <!-- Month dropdown -->
  <div class="dpill" id="dpill-month" onclick="toggleDrop('month',event)">
    <span id="dpill-month-label">All months</span>
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    <div class="dpop" id="dpop-month">
      <div class="dpop-months" id="dpop-months-grid"></div>
    </div>
  </div>
  <!-- Divider -->
  <div class="filter-div"></div>
  <!-- Tags (multi-select) -->
  <button class="ftag" data-f="platform" onclick="toggleTag('platform',this)">Platform</button>
  <button class="ftag" data-f="B2B" onclick="toggleTag('B2B',this)">B2B</button>
  <button class="ftag" data-f="Developer" onclick="toggleTag('Developer',this)">Developer</button>
  <button class="ftag" data-f="Consumer" onclick="toggleTag('Consumer',this)">Consumer</button>
  <button class="ftag" data-f="live" onclick="toggleTag('live',this)">Live Now</button>
  <button class="ftag" data-f="Asia" onclick="toggleTag('Asia',this)">Asia</button>
  <button class="ftag" data-f="Europe" onclick="toggleTag('Europe',this)">Europe</button>
  <button class="ftag" data-f="NorthAmerica" onclick="toggleTag('NorthAmerica',this)">Americas</button>
  <!-- Clear button -->
  <button class="clear-ftag" id="clear-ftag" onclick="clearTags()">&#10005; Clear</button>
</div>


<!-- EVENT LIST -->
<div id="event-list"></div>



<!-- ADD TO CALENDAR SHEET -->
<div class="cal-sheet" id="cal-sheet" onclick="if(event.target===this)closeCalSheet()">
  <div class="cal-body">
    <div class="cal-drag"></div>
    <div class="cal-ev-name" id="cal-ev-name"></div>
    <div class="cal-ev-meta" id="cal-ev-meta"></div>
    <div class="cal-options">
      <div class="cal-option" onclick="addToGoogleCal()">
        <div class="cal-opt-icon">📅</div>
        <div><div class="cal-opt-label">Google Calendar</div><div class="cal-opt-sub">Opens in browser</div></div>
      </div>
      <div class="cal-option" onclick="downloadICS()">
        <div class="cal-opt-icon">📥</div>
        <div><div class="cal-opt-label">Download .ics</div><div class="cal-opt-sub">Apple Calendar, Outlook, etc.</div></div>
      </div>
      <div class="cal-option" onclick="copyEventLink()">
        <div class="cal-opt-icon">🔗</div>
        <div><div class="cal-opt-label">Copy Event Link</div><div class="cal-opt-sub">Share with colleagues</div></div>
      </div>
    </div>
    <button class="cal-cancel" onclick="closeCalSheet()">Cancel</button>
  </div>
</div>

<script>
// ── API CONFIG ─────────────────────────────────────────────
const CAL_API   = 'https://gc-platform-api.vercel.app/api/events';
const STATS_API = 'https://gc-platform-api.vercel.app/api/events/stats';
const PAGE_SIZE = 30;

// ── STATE ──────────────────────────────────────────────────
var selYear    = 2026;
var selMonth   = 0;       // 0 = All, 1-12 = month number
var selTags    = [];      // multi-select tags
var showSavedOnly = false;
var openId     = null;
var savedEvs   = JSON.parse(localStorage.getItem('gc_saved_events') || '{}');
var goingEvs   = JSON.parse(localStorage.getItem('gc_going_events') || '{}');

// API state
var _state = {
  loading: false,
  offset: 0,
  total: 0,
  monthCounts: {},
  totalCountries: 0
};

var MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MONTHS_LONG  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// TAG → API type mapping
var TAG_TYPE_MAP = {
  'Conference': 'conference',
  'Trade Show': 'tradeshow',
  'B2B': 'b2b',
  'Developer': 'developer',
  'Consumer': 'consumer',
  'Online': 'online'
};

// ── COUNTRY FLAG HELPER ─────────────────────────────────────
function getFlag(country) {
  var flags = {
    'United States':'🇺🇸','USA':'🇺🇸','Germany':'🇩🇪','Japan':'🇯🇵','France':'🇫🇷',
    'United Kingdom':'🇬🇧','UK':'🇬🇧','Spain':'🇪🇸','Italy':'🇮🇹','Netherlands':'🇳🇱',
    'Sweden':'🇸🇪','Finland':'🇫🇮','Norway':'🇳🇴','Denmark':'🇩🇰','Poland':'🇵🇱',
    'South Korea':'🇰🇷','Korea':'🇰🇷','China':'🇨🇳','Taiwan':'🇹🇼','Singapore':'🇸🇬',
    'Australia':'🇦🇺','Canada':'🇨🇦','Brazil':'🇧🇷','Mexico':'🇲🇽','Argentina':'🇦🇷',
    'Israel':'🇮🇱','Turkey':'🇹🇷','Ukraine':'🇺🇦','Russia':'🇷🇺','India':'🇮🇳',
    'Thailand':'🇹🇭','Indonesia':'🇮🇩','Malaysia':'🇲🇾','Philippines':'🇵🇭',
    'Czech Republic':'🇨🇿','Czechia':'🇨🇿','Austria':'🇦🇹','Switzerland':'🇨🇭',
    'Belgium':'🇧🇪','Portugal':'🇵🇹','Greece':'🇬🇷','Hungary':'🇭🇺','Romania':'🇷🇴',
    'Croatia':'🇭🇷','Serbia':'🇷🇸','Bulgaria':'🇧🇬','Slovakia':'🇸🇰','Slovenia':'🇸🇮',
    'Cyprus':'🇨🇾','Malta':'🇲🇹','Estonia':'🇪🇪','Latvia':'🇱🇻','Lithuania':'🇱🇹',
    'United Arab Emirates':'🇦🇪','UAE':'🇦🇪','Saudi Arabia':'🇸🇦','Egypt':'🇪🇬',
    'South Africa':'🇿🇦','Nigeria':'🇳🇬','Kenya':'🇰🇪',
    'Colombia':'🇨🇴','Chile':'🇨🇱','Peru':'🇵🇪','Uruguay':'🇺🇾',
    'Online':'🌐','Global':'🌐','Worldwide':'🌐','Virtual':'🌐'
  };
  return flags[country] || '🌍';
}

// ── FORMAT HELPERS ──────────────────────────────────────────
function fmtDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return MONTHS_SHORT[d.getUTCMonth()] + ' ' + d.getUTCDate();
}
function fmtAttendees(n) {
  if (!n || n === 0) return '';
  if (n >= 1000000) return (n/1000000).toFixed(0) + 'M+';
  if (n >= 1000) return Math.round(n/1000) + 'K+';
  return n + '+';
}
function getMonthNum(dateStr) {
  if (!dateStr) return 0;
  return new Date(dateStr).getUTCMonth() + 1; // 1-12
}

// ── RENDER TOP BAR ──────────────────────────────────────────
function renderTopBar() {
  var tc  = document.getElementById('tb-count');
  var tco = document.getElementById('tb-countries');
  var tsn = document.getElementById('tb-saved-num');
  var tsb = document.getElementById('tb-saved-btn');
  var savedCount = Object.keys(savedEvs).filter(function(k){ return savedEvs[k]; }).length;
  if (tc)  tc.textContent  = _state.total.toLocaleString() + ' events';
  if (tco) tco.textContent = _state.totalCountries + ' countries';
  if (tsn) tsn.textContent = savedCount;
  if (tsb) tsb.classList.toggle('on', showSavedOnly);
}

// ── RENDER YEAR DROPDOWN ────────────────────────────────────
function renderYearDrop() {
  var el  = document.getElementById('dpop-years-list');
  var lbl = document.getElementById('dpill-year-label');
  if (!el) return;
  // Only show years that have data
  var years = [2026, 2027];
  el.innerHTML = years.map(function(y) {
    return '<div class="dpop-y'+(y===selYear?' active':'')+'" onclick="event.stopPropagation();pickYear('+y+')">' + y + '</div>';
  }).join('');
  if (lbl) lbl.textContent = selYear;
}

// ── RENDER MONTH DROPDOWN ───────────────────────────────────
function renderMonthDrop() {
  var el  = document.getElementById('dpop-months-grid');
  var lbl = document.getElementById('dpill-month-label');
  if (!el) return;
  var counts = _state.monthCounts || {};
  var items = MONTHS_SHORT.map(function(m, i) {
    var num = i + 1;
    var cnt = counts[num] || 0;
    var has = cnt > 0;
    var isActive = selMonth === num;
    var cls = 'dpop-m' + (has ? ' has' : '') + (isActive ? ' active' : '') + (!has ? ' nodata' : '');
    var dot = has ? '<span class="dpop-m-dot"></span>' : '';
    var cntBadge = has ? '<span class="dpop-m-cnt">'+cnt+'</span>' : '';
    return '<div class="'+cls+'" onclick="event.stopPropagation();'+(has?'pickMonth('+num+')':'')+'">' + MONTHS_LONG[i] + dot + cntBadge + '</div>';
  });
  el.innerHTML = items.join('');
  if (lbl) lbl.textContent = selMonth === 0 ? 'All months' : MONTHS_LONG[selMonth - 1];
}

// ── BUILD API PARAMS ────────────────────────────────────────
function buildParams(offset) {
  var today = new Date().toISOString().split('T')[0];
  var params = new URLSearchParams({
    year: selYear,
    limit: PAGE_SIZE,
    offset: offset || 0
  });
  if (selMonth > 0) {
    params.set('month', selMonth);
  } else {
    params.set('from_date', today);
  }
  // Map tags to API type filter (use first matching tag)
  var typeTag = selTags.find(function(t){ return TAG_TYPE_MAP[t]; });
  if (typeTag) params.set('type', TAG_TYPE_MAP[typeTag]);
  if (showSavedOnly) {
    // Filter to saved IDs
    var savedIds = Object.keys(savedEvs).filter(function(k){ return savedEvs[k]; });
    if (savedIds.length) params.set('ids', savedIds.join(','));
    else params.set('ids', 'none');
  }
  return params;
}

// ── RENDER CARD ─────────────────────────────────────────────
function renderCard(ev) {
  var startDate = fmtDate(ev.start_date);
  var endDate   = fmtDate(ev.end_date);
  var dayNum    = ev.start_date ? new Date(ev.start_date).getUTCDate() : '—';
  var monAbbr   = ev.start_date ? MONTHS_SHORT[new Date(ev.start_date).getUTCMonth()] : '';
  var flag      = ev.is_online ? '🌐' : getFlag(ev.country);
  var city      = ev.is_online ? 'Online' : (ev.city || '');
  var country   = ev.is_online ? '' : (ev.country || '');
  var location  = city + (country && !ev.is_online ? ', ' + country : '');
  var attendance = fmtAttendees(ev.attendee_count);
  var duration  = (startDate === endDate || !ev.end_date) ? startDate : startDate + ' – ' + endDate;
  var isOpen    = openId === ev.id;
  var isSaved   = !!savedEvs[ev.id];
  var isLive    = ev.status === 'live';
  var isEnded   = ev.status === 'ended';

  // Type badges
  var typeLabel = ev.type ? (ev.type.charAt(0).toUpperCase() + ev.type.slice(1).replace('tradeshow','Trade Show')) : '';
  var badgeHtml = typeLabel ? '<span class="ev-badge eb-type">'+typeLabel+'</span>' : '';
  if (isLive) badgeHtml = '<span class="ev-badge eb-live">🔴 LIVE</span>' + badgeHtml;
  if (ev.has_buyers) badgeHtml += '<span class="ev-badge eb-b2b">B2B</span>';

  var cardClass = 'ev-card' + (isOpen ? ' open' : '') + (isLive ? ' has-live' : '') + (isEnded ? ' ended' : '');
  var dateBoxClass = 'ev-date-box' + (isLive ? ' live-date' : '');
  var evIdStr = JSON.stringify(ev.id);

  var html = '<div class="'+cardClass+'" id="evc-'+ev.id+'" onclick="toggleCard('+evIdStr+')">';
  html += '<div class="ev-head">';
  html += '<div class="'+dateBoxClass+'"><div class="ev-date-day">'+dayNum+'</div><div class="ev-date-mon">'+monAbbr+'</div></div>';
  html += '<div class="ev-main">';
  html += '<div class="ev-badges">'+badgeHtml+'</div>';
  html += '<div class="ev-name">'+(ev.title || 'Untitled')+'</div>';
  html += '<div class="ev-meta"><span class="ev-loc"><span class="ev-flag">'+flag+'</span>'+location+'</span>'+(attendance?'<div class="ev-meta-dot"></div><span>'+attendance+'</span>':'')+'</div>';
  html += '</div>';
  html += '<div class="ev-actions">';
  html += '<button class="ev-save'+(isSaved?' on':'')+'" onclick="event.stopPropagation();toggleSave('+evIdStr+')">'+(isSaved?'★':'☆')+'</button>';
  html += '</div>';
  html += '</div>';
  // Expanded detail
  var desc = ev.description ? ev.description.substring(0, 200) + (ev.description.length > 200 ? '…' : '') : '';
  html += '<div class="ev-detail" onclick="event.stopPropagation()">';
  html += '<div class="ev-detail-dates">📅 '+duration+(location?' &nbsp;·&nbsp; '+location:'')+'</div>';
  if (desc) html += '<div class="ev-detail-desc">'+desc+'</div>';
  html += '<div class="ev-btns">';
  if (ev.online_url) {
    html += '<a class="ev-btn ev-btn-primary" href="'+ev.online_url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Website</a>';
  }
  html += '<button class="ev-btn ev-btn-cal" onclick="event.stopPropagation();openCalSheet('+evIdStr+')">📅 Add to Cal</button>';
  var isGoing = !!goingEvs[ev.id];
  html += '<button class="ev-btn ev-btn-going'+(isGoing?' on':'')+'" id="going-'+ev.id+'" onclick="event.stopPropagation();toggleGoing('+evIdStr+')">'+(isGoing?'✓ Going':'Going?')+'</button>';
  html += '<button class="ev-btn ev-btn-share" onclick="event.stopPropagation();shareEvent('+evIdStr+')">↑ Share</button>';
  html += '</div>';
  html += '</div>';
  html += '</div>';
  return html;
}

// ── LOAD EVENTS FROM API ────────────────────────────────────
var _loadedEvents = {}; // cache by id for cal sheet

async function loadEvents(reset) {
  if (_state.loading) return;
  _state.loading = true;

  var listEl   = document.getElementById('event-list');
  var loadMore = document.getElementById('load-more-btn');
  var spinner  = document.getElementById('load-spinner');

  if (reset) {
    _state.offset = 0;
    _loadedEvents = {};
    if (listEl) listEl.innerHTML = '<div class="ev-loading"><div class="ev-spinner"></div><div>Loading events…</div></div>';
    if (loadMore) loadMore.style.display = 'none';
  }

  var params = buildParams(_state.offset);

  try {
    var resp = await fetch(CAL_API + '?' + params.toString());
    var json = await resp.json();

    if (json.success) {
      var events = json.data || [];
      _state.total  = json.total || 0;
      _state.offset += events.length;

      // Cache events for cal sheet
      events.forEach(function(ev){ _loadedEvents[ev.id] = ev; });

      if (reset) {
        if (!events.length) {
          listEl.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No events found</div><div class="empty-sub">Try a different filter or month.</div></div>';
          _state.loading = false;
          renderTopBar();
          return;
        }
        listEl.innerHTML = '';
      }

      // Group by month and render
      var groups = {};
      var order  = [];
      events.forEach(function(ev) {
        var mNum = getMonthNum(ev.start_date);
        if (!groups[mNum]) { groups[mNum] = []; order.push(mNum); }
        groups[mNum].push(ev);
      });
      order = order.filter(function(v,i){ return order.indexOf(v)===i; });

      // If reset, create fresh groups; if load more, append to last group or add new
      var html = '';
      order.forEach(function(mNum) {
        var evs = groups[mNum];
        var mName = MONTHS_LONG[mNum - 1];
        // Check if this month group already exists in DOM
        var existingGroup = document.getElementById('mg-' + mNum);
        if (existingGroup && !reset) {
          // Append cards to existing group
          var existingList = existingGroup.querySelector('.mg-cards');
          if (existingList) {
            existingList.innerHTML += evs.map(renderCard).join('');
          }
        } else {
          html += '<div class="month-group" id="mg-'+mNum+'">';
          html += '<div class="mg-header"><span class="mg-month">'+mName+'</span><span class="mg-year">'+selYear+'</span><span class="mg-count">'+(_state.monthCounts[mNum]||evs.length)+'</span></div>';
          html += '<div class="mg-cards">'+evs.map(renderCard).join('')+'</div>';
          html += '</div>';
        }
      });
      if (html) listEl.innerHTML += html;

      // Show/hide load more
      var shown = _state.offset;
      var total = _state.total;
      if (loadMore) {
        loadMore.style.display = shown < total ? 'block' : 'none';
        loadMore.textContent = 'Load more (' + (total - shown).toLocaleString() + ' remaining)';
      }

      renderTopBar();
    }
  } catch(e) {
    if (listEl && reset) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><div class="empty-sub">'+e.message+'</div></div>';
    }
  }
  _state.loading = false;
}

// ── LOAD STATS (month counts + countries) ──────────────────
async function loadStats() {
  try {
    var resp = await fetch(STATS_API + '?year=' + selYear);
    var json = await resp.json();
    if (json.success) {
      _state.monthCounts    = json.months || {};
      _state.total          = json.total  || 0;
      _state.totalCountries = Object.keys(json.countries || {}).length;
      renderYearDrop();
      renderMonthDrop();
      renderTopBar();
    }
  } catch(e) { /* ignore */ }
}

// ── INTERACTIONS ────────────────────────────────────────────
function positionDrop(pillId, popId) {
  var pill = document.getElementById(pillId);
  var pop  = document.getElementById(popId);
  if (!pill || !pop) return;
  var r = pill.getBoundingClientRect();
  var top = r.bottom + 6;
  var left = r.left;
  // Ensure it doesn't go off-screen right
  var maxW = window.innerWidth - 12;
  pop.style.top  = top + 'px';
  pop.style.left = left + 'px';
  pop.style.maxWidth = (maxW - left) + 'px';
}
function toggleDrop(which, e) {
  e.stopPropagation();
  var yearPop  = document.getElementById('dpop-year');
  var monthPop = document.getElementById('dpop-month');
  if (which === 'year') {
    var isOpen = yearPop && yearPop.classList.contains('visible');
    if (monthPop) monthPop.classList.remove('visible');
    if (!isOpen) {
      positionDrop('dpill-year', 'dpop-year');
      if (yearPop) yearPop.classList.add('visible');
    document.getElementById('dpill-year').classList.add('open');
    } else {
      if (yearPop) yearPop.classList.remove('visible');
      document.getElementById('dpill-year').classList.remove('open');
    }
  } else {
    var isOpen = monthPop && monthPop.classList.contains('visible');
    if (yearPop) yearPop.classList.remove('visible');
    if (!isOpen) {
      positionDrop('dpill-month', 'dpop-month');
      if (monthPop) monthPop.classList.add('visible');
      document.getElementById('dpill-month').classList.add('open');
    } else {
      if (monthPop) monthPop.classList.remove('visible');
      document.getElementById('dpill-month').classList.remove('open');
    }
  }
}
document.addEventListener('click', function() {
  var yp = document.getElementById('dpop-year');
  var mp = document.getElementById('dpop-month');
  if (yp) yp.classList.remove('visible');
  if (mp) mp.classList.remove('visible');
});
function pickYear(y) {
  selYear = y; selMonth = 0;
  var _yp=document.getElementById('dpop-year');if(_yp)_yp.classList.remove('visible');
  loadStats().then(function(){ loadEvents(true); });
}
function pickMonth(m) {
  selMonth = (selMonth === m) ? 0 : m;
  var _mp=document.getElementById('dpop-month');if(_mp)_mp.classList.remove('visible');
  renderMonthDrop();
  loadEvents(true);
}
function toggleTag(tag, btn) {
  var idx = selTags.indexOf(tag);
  if (idx === -1) { selTags.push(tag); btn.classList.add('active'); }
  else            { selTags.splice(idx,1); btn.classList.remove('active'); }
  var clearBtn = document.getElementById('clear-ftag');
  if (clearBtn) clearBtn.classList.toggle('show', selTags.length > 0);
  loadEvents(true);
}
function clearTags() {
  selTags = [];
  document.querySelectorAll('.ftag').forEach(function(b){ b.classList.remove('active'); });
  var clearBtn = document.getElementById('clear-ftag');
  if (clearBtn) clearBtn.classList.remove('show');
  loadEvents(true);
}
function toggleSavedFilter() {
  showSavedOnly = !showSavedOnly;
  var tsb = document.getElementById('tb-saved-btn');
  if (tsb) tsb.classList.toggle('on', showSavedOnly);
  loadEvents(true);
}
function toggleCard(id) {
  openId = openId === id ? null : id;
  // Re-render just the open/close state
  var allCards = document.querySelectorAll('.ev-card');
  allCards.forEach(function(c){
    var cid = c.id.replace('evc-','');
    c.classList.toggle('open', cid === String(id) && openId !== null);
  });
  if (openId) {
    setTimeout(function() {
      var el = document.getElementById('evc-'+id);
      if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}
function toggleSave(id) {
  savedEvs[id] = !savedEvs[id];
  if (!savedEvs[id]) delete savedEvs[id];
  localStorage.setItem('gc_saved_events', JSON.stringify(savedEvs));
  var btn = document.querySelector('#evc-'+id+' .ev-save');
  if (btn) { btn.classList.toggle('on', !!savedEvs[id]); btn.textContent = savedEvs[id] ? '★' : '☆'; }
  renderTopBar();
}
function toggleGoing(id) {
  goingEvs[id] = !goingEvs[id];
  if (!goingEvs[id]) delete goingEvs[id];
  localStorage.setItem('gc_going_events', JSON.stringify(goingEvs));
  var btn = document.getElementById('going-'+id);
  if (btn) {
    btn.classList.toggle('on', !!goingEvs[id]);
    btn.textContent = goingEvs[id] ? '✓ Going' : 'Going?';
  }
}
function shareEvent(id) {
  var ev = _loadedEvents[id];
  if (!ev) return;
  var title = ev.title || 'Event';
  var startDate = ev.start_date ? new Date(ev.start_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
  var location = [ev.city, ev.country].filter(Boolean).join(', ');
  var text = title + (startDate ? ' · ' + startDate : '') + (location ? ' · ' + location : '');
  var url = ev.online_url || window.location.href;
  if (navigator.share) {
    navigator.share({ title: title, text: text, url: url }).catch(function(){});
  } else {
    navigator.clipboard.writeText(text + '\n' + url).then(function(){
      alert('Link copied to clipboard!');
    }).catch(function(){
      prompt('Copy this link:', url);
    });
  }
}

// ── CALENDAR SHEET ──────────────────────────────────────────
var calPendingId = null;
function openCalSheet(id) {
  calPendingId = id;
  var ev = _loadedEvents[id];
  if (!ev) return;
  var nameEl = document.getElementById('cal-ev-name');
  var metaEl = document.getElementById('cal-ev-meta');
  if (nameEl) nameEl.textContent = ev.title || '';
  if (metaEl) metaEl.textContent = fmtDate(ev.start_date) + (ev.end_date && ev.end_date !== ev.start_date ? ' – ' + fmtDate(ev.end_date) : '') + ' · ' + (ev.is_online ? 'Online' : [ev.city, ev.country].filter(Boolean).join(', '));
  var sheet = document.getElementById('cal-sheet');
  if (sheet) { sheet.classList.add('open'); document.body.style.overflow = 'hidden'; }
}
function closeCalSheet() {
  var sheet = document.getElementById('cal-sheet');
  if (sheet) { sheet.classList.remove('open'); document.body.style.overflow = ''; }
}
function addToGoogleCal() {
  var ev = _loadedEvents[calPendingId];
  if (!ev) return;
  var s = ev.start_date ? ev.start_date.replace(/-/g,'') : '';
  var e = ev.end_date   ? ev.end_date.replace(/-/g,'')   : s;
  // Add 1 day to end for Google Cal (exclusive end)
  if (e) {
    var ed = new Date(ev.end_date || ev.start_date);
    ed.setUTCDate(ed.getUTCDate() + 1);
    e = ed.toISOString().split('T')[0].replace(/-/g,'');
  }
  var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(ev.title || '')
    + '&dates=' + s + '/' + e
    + '&details=' + encodeURIComponent((ev.description || '') + '\n\n' + (ev.online_url || ''))
    + '&location=' + encodeURIComponent(ev.is_online ? 'Online' : [ev.city, ev.country].filter(Boolean).join(', '));
  window.open(url, '_blank');
  closeCalSheet();
}
function downloadICS() {
  var ev = _loadedEvents[calPendingId];
  if (!ev) return;
  var s = ev.start_date ? ev.start_date.replace(/-/g,'') : '';
  var ed = new Date(ev.end_date || ev.start_date);
  ed.setUTCDate(ed.getUTCDate() + 1);
  var e = ed.toISOString().split('T')[0].replace(/-/g,'');
  var ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Game Connection//Conference Calendar//EN',
    'BEGIN:VEVENT',
    'DTSTART;VALUE=DATE:'+s,
    'DTEND;VALUE=DATE:'+e,
    'SUMMARY:'+(ev.title||''),
    'LOCATION:'+(ev.is_online ? 'Online' : [ev.city,ev.country].filter(Boolean).join(', ')),
    'DESCRIPTION:'+(ev.description||'').replace(/\n/g,'\\n')+'\\n\\n'+(ev.online_url||''),
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  var blob = new Blob([ics], {type:'text/calendar'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (ev.title||'event').replace(/[^a-zA-Z0-9]/g,'_')+'.ics';
  a.click();
  closeCalSheet();
}
function copyEventLink() {
  var ev = _loadedEvents[calPendingId];
  if (!ev) return;
  var text = (ev.title||'') + '\n' + fmtDate(ev.start_date) + (ev.end_date && ev.end_date !== ev.start_date ? ' – '+fmtDate(ev.end_date) : '') + ' · ' + (ev.is_online ? 'Online' : [ev.city,ev.country].filter(Boolean).join(', ')) + '\n' + (ev.online_url||'');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ closeCalSheet(); });
  } else { closeCalSheet(); }
}

// ── LOAD MORE BUTTON ────────────────────────────────────────
function loadMoreEvents() {
  loadEvents(false);
}

// ── INIT ──────────────────────────────────────────────────
// Add load-more button to DOM if not present
(function() {
  var listEl = document.getElementById('event-list');
  if (listEl && !document.getElementById('load-more-btn')) {
    var btn = document.createElement('button');
    btn.id = 'load-more-btn';
    btn.className = 'load-more-btn';
    btn.style.display = 'none';
    btn.onclick = loadMoreEvents;
    listEl.parentNode.insertBefore(btn, listEl.nextSibling);
  }
  var spinner = document.createElement('div');
  spinner.id = 'load-spinner';
  spinner.style.display = 'none';
  if (listEl) listEl.parentNode.insertBefore(spinner, listEl.nextSibling);
})();

// Load stats first (for month counts), then load events
loadStats().then(function() { loadEvents(true); });
