<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #e8e4da;
  --orange: #d95f2b;
  --teal: #0a7fa8;
  --green: #0d9b72;
  --dark: #1c1a17;
  --mid: #6b6660;
  --soft: #a09890;
  --white: #fff;
  --radius: 12px;
  --tab-h: 64px;
  --top-h: 56px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--white);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #ddd9cf;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.topbar-search {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: 10px;
  padding: 8px 12px;
  gap: 8px;
}
.topbar-search input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--dark);
  outline: none;
}
.topbar-search input::placeholder { color: var(--soft); }
.topbar-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  font-size: 16px;
}
.topbar-notif { background: #f0ece4; color: var(--mid); position: relative; }
.topbar-notif::after {
  content: '';
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--orange);
  border-radius: 50%;
  border: 2px solid #fff;
}
.topbar-avatar {
  background: linear-gradient(135deg, var(--teal), var(--green));
  color: #fff;
  font-weight: 700;
  font-size: 13px;
}

/* ── SCROLL CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding-bottom: calc(var(--tab-h) + 16px);
}
.content::-webkit-scrollbar { display: none; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 20px 16px 12px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
}
.page-sub {
  font-size: 13px;
  color: var(--soft);
  margin-top: 2px;
}

/* ── FILTER PILLS ── */
.filter-section {
  padding: 0 16px 4px;
}
.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--soft);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.pill {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid #ddd9cf;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.pill:hover { background: #f0ece4; }
.pill.active {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
  font-weight: 600;
}

/* ── CARDS ── */
.cards-list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.project-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: box-shadow .2s, transform .15s;
  cursor: pointer;
  border: 1.5px solid transparent;
}
.project-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-2px); }
.project-card.favorited { border-color: var(--orange); }
.project-card.expanded .card-detail { display: block; }

/* Cover */
.card-cover {
  height: 120px;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 10px 12px;
  overflow: hidden;
}
.card-cover svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
.card-cover-title {
  position: relative;
  z-index: 2;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.5);
  line-height: 1.2;
}
.card-status-badge {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 2;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .3px;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.badge-publisher { background: rgba(217,95,43,.85); color: #fff; }
.badge-investment { background: rgba(10,127,168,.85); color: #fff; }
.badge-development { background: rgba(13,155,114,.85); color: #fff; }
.badge-released { background: rgba(28,26,23,.75); color: #fff; }
.badge-opensource { background: rgba(108,92,50,.75); color: #fff; }

/* Card body */
.card-body {
  padding: 12px 14px;
}
.card-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 4px;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
}
.card-genre {
  font-size: 11px;
  color: var(--soft);
  background: #f0ece4;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-top: 2px;
}
.card-studio {
  font-size: 12px;
  color: var(--mid);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-desc {
  font-size: 12px;
  color: var(--mid);
  line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-platforms {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.platform-tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 8px;
  background: #f0ece4;
  color: var(--mid);
  font-weight: 500;
}

/* Card actions */
.card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid #f0ece4;
  padding-top: 10px;
}
.card-act-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid #e2ddd3;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.card-act-btn:hover { background: #f0ece4; color: var(--dark); }
.card-act-btn.fav-active { color: var(--orange); border-color: var(--orange); }
.card-act-connect { background: var(--teal); color: #fff; border-color: var(--teal); }
.card-act-connect:hover { background: #086e90; }
.card-act-arrow {
  margin-left: auto;
  padding: 6px 10px;
  border: none;
  background: #f0ece4;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--mid);
  transition: background .15s;
}
.card-act-arrow:hover { background: #e2ddd3; color: var(--dark); }

/* Detail panel */
.card-detail {
  display: none;
  padding: 14px;
  border-top: 1px solid #f0ece4;
  background: #faf9f7;
}
.detail-desc {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  margin-bottom: 14px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-item {
  background: var(--white);
  border-radius: 8px;
  padding: 10px;
}
.detail-item-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--soft);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.detail-item-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--dark);
}
.seeking-section { margin-bottom: 14px; }
.seeking-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--soft);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.seeking-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.seeking-tag {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #e8f4f9;
  color: var(--teal);
}
.detail-btns {
  display: flex;
  gap: 8px;
}
.detail-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.detail-btn:hover { transform: translateY(-1px); }
.detail-btn-contact { background: var(--orange); color: #fff; }
.detail-btn-contact:hover { background: #c4541f; }
.detail-btn-save { background: #f0ece4; color: var(--mid); }
.detail-btn-save:hover { background: #e2ddd3; color: var(--dark); }
.detail-btn-share { background: #e8f4f9; color: var(--teal); }
.detail-btn-share:hover { background: #d2ebf4; }

/* ── BOTTOM TAB BAR ── */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--tab-h);
  background: var(--white);
  border-top: 1px solid #ddd9cf;
  display: flex;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 0;
  transition: opacity .15s;
}
.tab-item:active { opacity: .7; }
.tab-icon { font-size: 20px; }
.tab-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--soft);
}
.tab-item.active .tab-label { color: var(--orange); font-weight: 700; }
.tab-item.active .tab-icon { transform: scale(1.1); }

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--dark);
  color: #fff;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  transition: transform .3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

const STATUS_BADGE_CLASS = {
  "Seeking Publisher": "badge-publisher",
  "Seeking Investment": "badge-investment",
  "In Development": "badge-development",
  "Released": "badge-released",
  "Open Source": "badge-opensource"
};

let state = {
  status: 'All',
  platform: 'All',
  search: '',
  favorites: JSON.parse(localStorage.getItem('gcProjFavs') || '[]'),
  expanded: null
};

function isFav(id) { return state.favorites.includes(id); }
function toggleFav(id, e) {
  if (e) e.stopPropagation();
  if (isFav(id)) {
    state.favorites = state.favorites.filter(f => f !== id);
    showToast('Removed from saved');
  } else {
    state.favorites.push(id);
    showToast('Saved! ✓');
  }
  localStorage.setItem('gcProjFavs', JSON.stringify(state.favorites));
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleExpand(id, e) {
  if (e) e.stopPropagation();
  state.expanded = state.expanded === id ? null : id;
  render();
  if (state.expanded === id) {
    setTimeout(() => {
      const el = document.getElementById('proj-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function getFiltered() {
  return PROJECTS.filter(p => {
    if (state.status !== 'All' && p.status !== state.status) return false;
    if (state.platform !== 'All' && !p.platforms.includes(state.platform)) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      if (!p.name.toLowerCase().includes(q) &&
          !p.studio.toLowerCase().includes(q) &&
          !p.genre.toLowerCase().includes(q) &&
          !p.country.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function platformIcon(p) {
  const icons = { PC: '🖥️', Mobile: '📱', Console: '🎮', VR: '🥽' };
  return icons[p] || p;
}

function render() {
  const list = document.getElementById('cardsList');
  const projects = getFiltered();
  document.getElementById('pageSubtitle').textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''} found`;

  if (projects.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--soft)"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="font-size:16px;font-weight:600;color:var(--mid)">No projects found</div><div style="font-size:13px;margin-top:6px">Try different filters</div></div>`;
    return;
  }

  list.innerHTML = projects.map(p => {
    const fav = isFav(p.id);
    const expanded = state.expanded === p.id;
    const platTags = p.platforms.map(pl => `<span class="platform-tag">${platformIcon(pl)} ${pl}</span>`).join('');
    const seekTags = p.seeking.map(s => `<span class="seeking-tag">${s}</span>`).join('');
    const detailGridItems = [
      { label: 'Engine', val: p.engine },
      { label: 'Team Size', val: p.team },
      { label: 'In Dev', val: p.duration },
      { label: 'Status', val: p.status }
    ].map(i => `<div class="detail-item"><div class="detail-item-label">${i.label}</div><div class="detail-item-val">${i.val}</div></div>`).join('');

    return `
    <div class="project-card ${fav ? 'favorited' : ''} ${expanded ? 'expanded' : ''}" id="proj-${p.id}">
      <div class="card-cover" onclick="toggleExpand(${p.id}, event)">
        <svg viewBox="0 0 480 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cg${p.id}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:${p.coverGrad.match(/#[a-f0-9]{3,6}/gi)?.[0]||'#1c1a17'}"/>
              <stop offset="50%" style="stop-color:${p.coverGrad.match(/#[a-f0-9]{3,6}/gi)?.[1]||'#374151'}"/>
              <stop offset="100%" style="stop-color:${p.coverGrad.match(/#[a-f0-9]{3,6}/gi)?.[2]||'#d95f2b'}"/>
            </linearGradient>
            <filter id="nf${p.id}"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
          </defs>
          <rect width="480" height="120" fill="url(#cg${p.id})"/>
          <rect width="480" height="120" fill="url(#cg${p.id})" opacity="0.3" filter="url(#nf${p.id})"/>
          <rect width="480" height="40" y="80" fill="url(#overlay${p.id})"/>
          <defs><linearGradient id="overlay${p.id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/></linearGradient></defs>
        </svg>
        <span class="card-status-badge ${STATUS_BADGE_CLASS[p.status]}">${p.status}</span>
        <span class="card-cover-title">${p.name}</span>
      </div>
      <div class="card-body" onclick="toggleExpand(${p.id}, event)">
        <div class="card-name-row">
          <div class="card-name">${p.name}</div>
          <div class="card-genre">${p.genre}</div>
        </div>
        <div class="card-studio">${p.flag} ${p.studio} · ${p.city}</div>
        <div class="card-desc">${p.shortDesc}</div>
        <div class="card-platforms">${platTags}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="card-act-btn ${fav ? 'fav-active' : ''}" onclick="toggleFav(${p.id}, event)">${fav ? '♥' : '♡'} Save</button>
          <button class="card-act-btn card-act-connect" onclick="showToast('Connect request sent! ✓')">👥 Connect</button>
          <button class="card-act-arrow" onclick="toggleExpand(${p.id}, event)">${expanded ? '▲' : '▼'}</button>
        </div>
      </div>
      <div class="card-detail">
        <div class="detail-desc">${p.fullDesc}</div>
        <div class="detail-grid">${detailGridItems}</div>
        <div class="seeking-section">
          <div class="seeking-title">🤝 Seeking</div>
          <div class="seeking-tags">${seekTags}</div>
        </div>
        <div class="detail-btns">
          <button class="detail-btn detail-btn-contact" onclick="showToast('Opening contact form…')">✉️ Contact</button>
          <button class="detail-btn detail-btn-save" onclick="toggleFav(${p.id}, event)">${fav ? '♥ Saved' : '♡ Save'}</button>
          <button class="detail-btn detail-btn-share" onclick="showToast('Link copied! 🔗')">🔗</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Filter pills
document.querySelectorAll('#statusFilter .pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#statusFilter .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.status = btn.dataset.status;
    render();
  };
});

document.querySelectorAll('#platformFilter .pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#platformFilter .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.platform = btn.dataset.platform;
    render();
  };
});

document.getElementById('searchInput').oninput = e => {
  state.search = e.target.value.trim();
  render();
};

render();
</script>
