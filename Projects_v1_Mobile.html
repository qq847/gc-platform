<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Projects & Games – Game Connection</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f7f5;
  --orange: #d95f2b;
  --teal: #0a7fa8;
  --green: #0d9b72;
  --dark: #1c1a17;
  --mid: #6b6660;
  --soft: #a09890;
  --white: #fff;
  --radius: 12px;
  --tab-h: 58px;
  --top-h: 56px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding-bottom: var(--tab-h);
}

.app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--white);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #ddd9cf;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.topbar-search {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: 10px;
  padding: 8px 12px;
  gap: 8px;
}
.topbar-search input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--dark);
  outline: none;
}
.topbar-search input::placeholder { color: var(--soft); }
.topbar-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  font-size: 16px;
}
.topbar-notif { background: #f0ece4; color: var(--mid); position: relative; }
.topbar-notif::after {
  content: '';
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--orange);
  border-radius: 50%;
  border: 2px solid #fff;
}
.topbar-avatar {
  background: linear-gradient(135deg, var(--teal), var(--green));
  color: #fff;
  font-weight: 700;
  font-size: 13px;
}

/* ── SCROLL CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding-bottom: calc(var(--tab-h) + 16px);
}
.content::-webkit-scrollbar { display: none; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 20px 16px 12px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
}
.page-sub {
  font-size: 13px;
  color: var(--soft);
  margin-top: 2px;
}

/* ── FILTER PILLS ── */
.filter-section {
  padding: 0 16px 4px;
}
.filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.pill {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid #ddd9cf;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.pill:hover { background: #f0ece4; }
.pill.active {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
  font-weight: 600;
}

/* ── CARDS ── */
.cards-list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.project-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: box-shadow .2s, transform .15s;
  cursor: pointer;
  border: 1.5px solid transparent;
}
.project-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-2px); }
.project-card.favorited { border-color: var(--orange); }
.project-card.expanded .card-detail { display: block; }

/* Cover */
.card-cover {
  height: 130px;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 10px 12px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
}
.card-cover-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
}
.card-cover-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%);
}
.card-cover-title {
  position: relative;
  z-index: 2;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
  line-height: 1.2;
}
.card-cover-genre-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  opacity: 0.25;
  z-index: 1;
}
.card-status-badge {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 2;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .3px;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.badge-seeking_publisher { background: rgba(217,95,43,.85); color: #fff; }
.badge-seeking_investment { background: rgba(10,127,168,.85); color: #fff; }
.badge-in_development { background: rgba(13,155,114,.85); color: #fff; }
.badge-released { background: rgba(28,26,23,.75); color: #fff; }
.badge-beta { background: rgba(245,158,11,.85); color: #fff; }
.badge-playable_demo { background: rgba(37,99,235,.85); color: #fff; }
.badge-concept { background: rgba(107,114,128,.75); color: #fff; }
.badge-default { background: rgba(28,26,23,.65); color: #fff; }
.card-seeking-badge {
  position: absolute;
  top: 10px; right: 10px;
  z-index: 2;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  background: rgba(0,0,0,.5);
  color: #fff;
  backdrop-filter: blur(4px);
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Card body */
.card-body {
  padding: 12px 14px;
}
.card-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 4px;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-genre {
  font-size: 11px;
  color: var(--soft);
  background: #f0ece4;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-top: 2px;
  white-space: nowrap;
}
.card-studio {
  font-size: 12px;
  color: var(--mid);
  margin-bottom: 8px;
}
.card-desc {
  font-size: 12px;
  color: var(--mid);
  line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-platforms {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.platform-tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 8px;
  background: #f0ece4;
  color: var(--mid);
  font-weight: 500;
}

/* Card actions */
.card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid #f0ece4;
  padding-top: 10px;
}
.card-act-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid #e2ddd3;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.card-act-btn:hover { background: #f0ece4; color: var(--dark); }
.card-act-btn.fav-active { color: var(--orange); border-color: var(--orange); }
.card-act-connect { background: var(--teal); color: #fff; border-color: var(--teal); }
.card-act-connect:hover { background: #086e90; }
.card-act-arrow {
  margin-left: auto;
  padding: 6px 10px;
  border: none;
  background: #f0ece4;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--mid);
  transition: background .15s;
}
.card-act-arrow:hover { background: #e2ddd3; color: var(--dark); }

/* Detail panel */
.card-detail {
  display: none;
  padding: 14px;
  border-top: 1px solid #f0ece4;
  background: #faf9f7;
}
.detail-desc {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.6;
  margin-bottom: 14px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-item {
  background: var(--white);
  border-radius: 8px;
  padding: 10px;
}
.detail-item-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--soft);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.detail-item-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--dark);
}
.seeking-section { margin-bottom: 14px; }
.seeking-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--soft);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.seeking-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.seeking-tag {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #e8f4f9;
  color: var(--teal);
}
.detail-btns {
  display: flex;
  gap: 8px;
}
.detail-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.detail-btn:hover { transform: translateY(-1px); }
.detail-btn-contact { background: var(--orange); color: #fff; }
.detail-btn-contact:hover { background: #c4541f; }
.detail-btn-save { background: #f0ece4; color: var(--mid); }
.detail-btn-save:hover { background: #e2ddd3; color: var(--dark); }
.detail-btn-share { background: #e8f4f9; color: var(--teal); }
.detail-btn-share:hover { background: #d2ebf4; }

/* Load more */
.load-more-wrap {
  text-align: center;
  padding: 20px 16px 8px;
}
.load-more-btn {
  padding: 11px 32px;
  border-radius: 24px;
  background: var(--dark);
  color: #fff;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
}
.load-more-btn:hover { background: #3a3835; }

/* Loading / empty states */
.state-msg {
  text-align: center;
  padding: 48px 20px;
  color: var(--soft);
}
.state-msg .state-icon { font-size: 40px; margin-bottom: 12px; }
.state-msg .state-title { font-size: 16px; font-weight: 600; color: var(--mid); }
.state-msg .state-sub { font-size: 13px; margin-top: 6px; }

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--dark);
  color: #fff;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  transition: transform .3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.gc-bn-i svg{fill:#b0aba3;color:#b0aba3;stroke:none;transition:fill .15s,color .15s;}

.gc-bn:hover .gc-bn-i svg{fill:#6b6660;color:#6b6660;}
</style>

  if (!genre) return ['🎮', '#2a2a2a,#555'];
  const g = genre.toLowerCase();
  for (const [key, val] of Object.entries(_GENRE_GRADS)) {
    if (g.includes(key)) return val;
  }
  return ['🎮', '#2a2a2a,#555'];
}

function _statusLabel(status) {
  const map = {
    'seeking_publisher': 'Seeking Publisher',
    'seeking_investment': 'Seeking Investment',
    'in_development': 'In Development',
    'released': 'Released',
    'beta': 'Beta',
    'playable_demo': 'Playable Demo',
    'concept': 'Concept',
    'soft_launch': 'Soft Launch',
    'release_candidate': 'Release Candidate',
  };
  return map[status] || (status ? status.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : '');
}

function _badgeClass(status) {
  const s = (status||'').toLowerCase().replace(/\s+/g,'_');
  const valid = ['seeking_publisher','seeking_investment','in_development','released','beta','playable_demo','concept'];
  return valid.includes(s) ? 'badge-'+s : 'badge-default';
}

function _platformIcon(p) {
  const icons = { PC: '🖥️', Mobile: '📱', Console: '🎮', VR: '🥽', Switch: '🕹️', PS4: '🎮', PS5: '🎮', 'Xbox One': '🎮', 'Xbox Series': '🎮' };
  return (icons[p] || '') + ' ' + p;
}

// ═══ IGDB IMAGE FETCH ═══
async function _fetchIgdbImg(title, bannerId) {
  if (!title) return;
  if (_igdbCache[title] !== undefined) {
    if (_igdbCache[title]) _applyBanner(bannerId, _igdbCache[title]);
    return;
  }
  _igdbCache[title] = null; // mark as pending
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent(
      'https://www.igdb.com/search_autocomplete_all?q=' + encodeURIComponent(title)
    );
    const r = await fetch(url);
    const data = await r.json();
    const games = data.game_suggest || [];
    if (games.length > 0) {
      const g = games[0];
      const imgId = g.cloudinary_id || (g.cover && g.cover.cloudinary_id);
      if (imgId) {
        const imgUrl = 'https://images.igdb.com/igdb/image/upload/t_screenshot_big/' + imgId + '.jpg';
        _igdbCache[title] = imgUrl;
        _applyBanner(bannerId, imgUrl);
      }
    }
  } catch(e) { /* silently fail, keep gradient */ }
}

function _applyBanner(bannerId, imgUrl) {
  const el = document.getElementById(bannerId);
  if (el) {
    el.style.backgroundImage = 'url(' + imgUrl + ')';
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    // hide the genre icon when real image loads
    const icon = el.querySelector('.card-cover-genre-icon');
    if (icon) icon.style.opacity = '0';
  }
}

// ═══ FAVORITES ═══
function isFav(id) { return _favorites.includes(id); }
function toggleFav(id, e) {
  if (e) e.stopPropagation();
  if (isFav(id)) {
    _favorites = _favorites.filter(f => f !== id);
    showToast('Removed from saved');
  } else {
    _favorites.push(id);
    showToast('Saved! ✓');
  }
  localStorage.setItem('gcMobProjFavs', JSON.stringify(_favorites));
  // update just this card's fav button
  const card = document.getElementById('mproj-' + id);
  if (card) {
    card.classList.toggle('favorited', isFav(id));
    const btn = card.querySelector('.card-act-btn:first-child');
    if (btn) { btn.classList.toggle('fav-active', isFav(id)); btn.textContent = isFav(id) ? '♥ Save' : '♡ Save'; }
    const detailBtn = card.querySelector('.detail-btn-save');
    if (detailBtn) detailBtn.textContent = isFav(id) ? '♥ Saved' : '♡ Save';
  }
}

function toggleExpand(id, e) {
  if (e) e.stopPropagation();
  const prev = _expanded;
  _expanded = (_expanded === id) ? null : id;
  if (prev !== null) {
    const prevCard = document.getElementById('mproj-' + prev);
    if (prevCard) {
      prevCard.classList.remove('expanded');
      const arrow = prevCard.querySelector('.card-act-arrow');
      if (arrow) arrow.textContent = '▼';
    }
  }
  if (_expanded !== null) {
    const card = document.getElementById('mproj-' + _expanded);
    if (card) {
      card.classList.add('expanded');
      const arrow = card.querySelector('.card-act-arrow');
      if (arrow) arrow.textContent = '▲';
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  }
}

// ═══ TOAST ═══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══ BUILD QUERY URL ═══
function _buildUrl(offset) {
  let url = _SB_URL + '/rest/v1/game_projects?select=id,title,tagline,description,genre,status,looking_for,platforms,cover_image_url&is_public=eq.true&order=created_at.desc&limit=' + PAGE_SIZE + '&offset=' + offset;
  if (_statusFilter) url += '&status=eq.' + encodeURIComponent(_statusFilter);
  if (_searchQuery) url += '&title=ilike.*' + encodeURIComponent(_searchQuery) + '*';
  if (_platformFilter) url += '&platforms=cs.["' + encodeURIComponent(_platformFilter) + '"]';
  return url;
}

// ═══ RENDER A SINGLE CARD ═══
function _renderCard(p) {
  const genre = (Array.isArray(p.genre) ? (p.genre[0]||'') : (p.genre||'')).replace(/;+/g,'').trim();
  const [genreIcon, genreGrad] = _getGenreStyle(genre);
  const grad = 'linear-gradient(135deg,' + genreGrad + ')';
  const statusLabel = _statusLabel(p.status);
  const badgeCls = _badgeClass(p.status);
  const studio = p.tagline || '';
  const desc = (p.description || '').slice(0, 140) + ((p.description||'').length > 140 ? '…' : '');
  const plats = [...new Set((p.platforms||[]).filter(pl => pl && !pl.toLowerCase().includes('please select')))].slice(0,4);
  const platTags = plats.map(pl => `<span class="platform-tag">${_platformIcon(pl)}</span>`).join('');
  const _lfArr = Array.isArray(p.looking_for)
    ? p.looking_for.map(s => (s||'').replace(/;+/g,'').trim()).filter(Boolean)
    : [(p.looking_for||'').replace(/;+/g,'').trim()].filter(Boolean);
  const seekBadge = _lfArr.length
    ? `<span class="card-seeking-badge">${_lfArr[0].length > 22 ? _lfArr[0].slice(0,20)+'…' : _lfArr[0]}</span>`
    : '';
  const bannerId = 'mpb-' + p.id;
  const fav = isFav(p.id);

  // Detail grid items
  const detailItems = [
    { label: 'Genre', val: genre || '—' },
    { label: 'Status', val: statusLabel || '—' },
    { label: 'Platforms', val: plats.join(', ') || '—' },
    { label: 'Looking For', val: _lfArr.slice(0,2).join(', ') || '—' },
  ].map(i => `<div class="detail-item"><div class="detail-item-label">${i.label}</div><div class="detail-item-val">${i.val}</div></div>`).join('');

  const seekTags = _lfArr.map(s => `<span class="seeking-tag">${s}</span>`).join('');

  return `
  <div class="project-card ${fav ? 'favorited' : ''}" id="mproj-${p.id}">
    <div class="card-cover" id="${bannerId}" style="background:${grad}" onclick="toggleExpand('${p.id}', event)">
      <div class="card-cover-overlay"></div>
      <span class="card-cover-genre-icon">${genreIcon}</span>
      ${statusLabel ? `<span class="card-status-badge ${badgeCls}">${statusLabel}</span>` : ''}
      ${seekBadge}
      <span class="card-cover-title">${p.title || ''}</span>
    </div>
    <div class="card-body" onclick="toggleExpand('${p.id}', event)">
      <div class="card-name-row">
        <div class="card-name">${p.title || ''}</div>
        ${genre ? `<div class="card-genre">${genre}</div>` : ''}
      </div>
      ${studio ? `<div class="card-studio">${studio}</div>` : ''}
      ${desc ? `<div class="card-desc">${desc}</div>` : ''}
      ${platTags ? `<div class="card-platforms">${platTags}</div>` : ''}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-act-btn ${fav ? 'fav-active' : ''}" onclick="toggleFav('${p.id}', event)">${fav ? '♥ Save' : '♡ Save'}</button>
        <button class="card-act-btn card-act-connect" onclick="showToast('Connect request sent! ✓')">👥 Connect</button>
        <button class="card-act-arrow" onclick="toggleExpand('${p.id}', event)">▼</button>
      </div>
    </div>
    <div class="card-detail">
      ${desc ? `<div class="detail-desc">${p.description || ''}</div>` : ''}
      <div class="detail-grid">${detailItems}</div>
      ${seekTags ? `<div class="seeking-section"><div class="seeking-title">🤝 Looking For</div><div class="seeking-tags">${seekTags}</div></div>` : ''}
      <div class="detail-btns">
        <button class="detail-btn detail-btn-contact" onclick="showToast('Opening contact form…')">✉️ Contact</button>
        <button class="detail-btn detail-btn-save" onclick="toggleFav('${p.id}', event)">${fav ? '♥ Saved' : '♡ Save'}</button>
        <button class="detail-btn detail-btn-share" onclick="showToast('Link copied! 🔗')">🔗</button>
      </div>
    </div>
  </div>`;
}

// ═══ LOAD DATA ═══
async function loadProjects(reset) {
  if (_loading) return;
  _loading = true;
  const list = document.getElementById('cardsList');

  if (reset) {
    _offset = 0;
    list.innerHTML = '<div class="state-msg"><div class="state-icon">⏳</div><div class="state-title">Loading…</div></div>';
  }

  try {
    const url = _buildUrl(_offset);
    const r = await fetch(url, { headers: { ..._SB_H, 'Prefer': 'count=exact' } });
    const cr = r.headers.get('content-range');
    _total = cr ? parseInt(cr.split('/')[1]) || 0 : 0;
    const data = await r.json();

    if (!Array.isArray(data) || data.length === 0) {
      if (reset) {
        list.innerHTML = '<div class="state-msg"><div class="state-icon">🔍</div><div class="state-title">No projects found</div><div class="state-sub">Try different filters</div></div>';
      }
      document.getElementById('loadMoreWrap').style.display = 'none';
      _loading = false;
      return;
    }

    const html = data.map(_renderCard).join('');
    if (reset) {
      list.innerHTML = html;
    } else {
      list.insertAdjacentHTML('beforeend', html);
    }

    // Update subtitle
    const fmt = n => n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'K+' : String(n);
    document.getElementById('pageSubtitle').textContent = fmt(_total) + ' projects from worldwide studios';

    // Async load IGDB images
    data.forEach(p => {
      if (p.title) setTimeout(() => _fetchIgdbImg(p.title, 'mpb-' + p.id), 0);
    });

    _offset += data.length;

    // Load more button
    const wrap = document.getElementById('loadMoreWrap');
    const btn = document.getElementById('loadMoreBtn');
    if (_offset < _total) {
      wrap.style.display = 'block';
      btn.textContent = 'Load More (' + (_total - _offset).toLocaleString() + ' remaining)';
    } else {
      wrap.style.display = 'none';
    }

  } catch(e) {
    console.error('Projects load error:', e);
    if (reset) {
      list.innerHTML = '<div class="state-msg"><div class="state-icon">⚠️</div><div class="state-title">Failed to load</div><div class="state-sub">Please check your connection</div></div>';
    }
  }
  _loading = false;
}

function loadMore() {
  loadProjects(false);
}

// ═══ FILTERS ═══
document.querySelectorAll('#statusFilter .pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#statusFilter .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _statusFilter = btn.dataset.status || '';
    loadProjects(true);
  };
});

document.querySelectorAll('#platformFilter .pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#platformFilter .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _platformFilter = btn.dataset.platform || '';
    loadProjects(true);
  };
});

// ═══ SEARCH (debounced) ═══
let _searchTimer = null;
document.getElementById('searchInput').oninput = e => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    _searchQuery = e.target.value.trim();
    loadProjects(true);
  }, 400);
};

// ═══ INIT ═══
loadProjects(true);
</script>
