<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Messages — Game Connection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#f5f2ee;font-family:"DM Sans","PingFang SC",sans-serif;color:#1c1a17}

:root{
  --orange:#d95f2b;
  --text1:#1c1a17;
  --text2:#6b6660;
  --text3:#a09890;
  --divider:rgba(0,0,0,0.07);
  --bg:#f5f2ee;
  --topbar-bg:rgba(245,242,238,0.97);
}

.app{max-width:480px;margin:0 auto;height:100vh;background:var(--bg);padding-bottom:58px;position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  background:var(--topbar-bg);
  padding:12px 16px 0;
  border-bottom:1px solid var(--divider);
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-shrink:0;
}
.topbar-row{
  display:flex;align-items:center;margin-bottom:10px;
}
.tb-title{flex:1;font-size:18px;font-weight:700;color:var(--text1);}
.tb-icons{display:flex;align-items:center;gap:4px;}
.tb-icon-btn{
  width:34px;height:34px;border-radius:50%;background:transparent;
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);
  transition:background .15s;
}
.tb-icon-btn:hover{background:rgba(0,0,0,0.06);}
.tb-icon-btn.active{color:var(--orange);}
.tb-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#2d2d2d,#d95f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
  cursor:pointer;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.6);
  position:relative;
}
.tb-avatar-dot{
  position:absolute;bottom:0;right:0;width:9px;height:9px;
  border-radius:50%;background:#22c55e;
  border:2px solid var(--topbar-bg);
}

/* ── TABS ── */
.tabs{
  display:flex;align-items:center;gap:0;
}
.tab{
  padding:0 4px 10px;margin-right:20px;
  font-size:14px;font-weight:500;color:var(--text3);
  cursor:pointer;position:relative;
  border:none;background:transparent;
  transition:color .15s;
  white-space:nowrap;
}
.tab.active{color:var(--text1);font-weight:700;}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2.5px;background:var(--text1);border-radius:2px;
}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--orange);color:#fff;
  font-size:9px;font-weight:700;
  min-width:16px;height:16px;padding:0 4px;
  border-radius:8px;margin-left:5px;
  vertical-align:middle;
}

/* ── SEARCH BAR ── */
.search-wrap{
  padding:10px 16px;
  background:var(--topbar-bg);
  border-bottom:1px solid var(--divider);
  display:none;
  flex-shrink:0;
}
.search-wrap.show{display:block;}
.search-box{
  display:flex;align-items:center;
  background:rgba(0,0,0,0.06);
  border-radius:10px;padding:0 12px;gap:8px;
}
.search-box:focus-within{background:rgba(0,0,0,0.09);}
.search-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:"DM Sans",sans-serif;font-size:14px;color:var(--text1);
  padding:9px 0;
}
.search-input::placeholder{color:var(--text3);}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* ── CONV LIST (Reddit style: no cards, full-width rows) ── */
.conv-list{
  padding:0;
}

.conv-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  cursor:pointer;
  position:relative;
  transition:background .1s;
  border-bottom:1px solid var(--divider);
}
.conv-row:active{background:rgba(0,0,0,0.04);}
.conv-row:last-child{border-bottom:none;}

/* Avatar */
.conv-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
  position:relative;
  overflow:visible;
}
.av-online-dot{
  position:absolute;bottom:1px;right:1px;
  width:12px;height:12px;border-radius:50%;
  background:#22c55e;
  border:2.5px solid var(--bg);
}
.av-busy-dot{
  position:absolute;bottom:1px;right:1px;
  width:12px;height:12px;border-radius:50%;
  background:var(--orange);
  border:2.5px solid var(--bg);
}

/* Body */
.conv-body{flex:1;min-width:0;}
.conv-row1{
  display:flex;align-items:baseline;
  justify-content:space-between;
  margin-bottom:2px;
}
.conv-name{
  font-size:15px;font-weight:500;color:var(--text1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:220px;
}
.conv-name.unread{font-weight:700;}
.conv-time{
  font-size:12px;color:var(--text3);
  flex-shrink:0;margin-left:8px;
}
.conv-preview{
  font-size:13px;color:var(--text3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;
}
.conv-preview.unread{
  color:var(--text2);font-weight:500;
}
.conv-preview .sender-prefix{color:var(--text3);font-weight:400;}

/* Unread indicator — left border, Reddit style */
.conv-row.has-unread::before{
  content:'';
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:32px;border-radius:0 2px 2px 0;
  background:var(--orange);
}

/* ── SECTION DIVIDER ── */
.section-divider{
  padding:14px 16px 6px;
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
}

/* ── EMPTY STATE ── */
.empty-state{
  padding:60px 24px;text-align:center;
}
.empty-state svg{opacity:.25;margin-bottom:12px;}
.empty-state p{font-size:14px;color:var(--text3);}

/* ── FAB (new message) ── */
.fab{
  position:fixed;bottom:74px;right:calc(50% - 240px + 16px);
  width:52px;height:52px;border-radius:50%;
  background:var(--orange);color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(217,95,43,0.4);
  z-index:300;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(217,95,43,0.35);}
@media(max-width:480px){
  .fab{right:16px;}
}

/* ── CHAT OVERLAY ── */
.chat-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  transform:translateX(100%);
  background:var(--bg);z-index:500;
  display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.25,.46,.45,.94);
  overflow:hidden;
}
.chat-overlay.open{transform:translateX(0);}

.chat-header{
  background:var(--topbar-bg);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--divider);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-shrink:0;
}
.chat-back{
  width:32px;height:32px;border-radius:50%;background:transparent;
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);
  transition:background .15s;
}
.chat-back:hover{background:rgba(0,0,0,0.06);}
.chat-peer-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.chat-peer-info{flex:1;min-width:0;}
.chat-peer-name{font-size:15px;font-weight:700;color:var(--text1);}
.chat-peer-sub{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-more-btn{
  width:32px;height:32px;border-radius:50%;background:transparent;
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);
  transition:background .15s;
}
.chat-more-btn:hover{background:rgba(0,0,0,0.06);}

.chat-messages{
  flex:1;overflow-y:auto;padding:14px 14px;
  display:flex;flex-direction:column;gap:8px;
}
.date-sep{
  text-align:center;font-size:11px;color:var(--text3);
  padding:4px 0;margin:4px 0;align-self:center;
}
.msg{display:flex;gap:8px;max-width:86%;}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;align-self:flex-end;
}
.msg-bubble{
  padding:9px 13px;border-radius:18px;
  font-size:14px;line-height:1.5;
}
.msg:not(.me) .msg-bubble{
  background:#fff;color:var(--text1);
  border-bottom-left-radius:4px;
  box-shadow:0 1px 2px rgba(0,0,0,0.06);
}
.msg.me .msg-bubble{
  background:var(--orange);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-time{font-size:10px;color:var(--text3);align-self:flex-end;white-space:nowrap;padding-bottom:2px;}
.msg.me .msg-time{color:rgba(255,255,255,.6);order:1;}

.chat-input-area{
  background:var(--topbar-bg);
  padding:10px 12px;
  border-top:1px solid var(--divider);
  display:flex;align-items:center;gap:8px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  flex-shrink:0;
}
.chat-attach{
  width:34px;height:34px;border-radius:50%;background:transparent;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);flex-shrink:0;
}
.chat-input-wrap{
  flex:1;background:#fff;border-radius:20px;
  display:flex;align-items:center;padding:0 14px;
  border:1px solid rgba(0,0,0,0.1);
}
.chat-input-wrap input{
  flex:1;border:none;background:transparent;
  font-family:"DM Sans",sans-serif;font-size:14px;
  padding:9px 0;outline:none;color:var(--text1);
}
.chat-input-wrap input::placeholder{color:var(--text3);}
.chat-send{
  width:34px;height:34px;border-radius:50%;
  background:var(--orange);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;transition:.15s;
}
.chat-send:hover{opacity:.88;}

/* ═══ BOTTOM NAV ═══ */
.gc-bnav{
  position:fixed;bottom:0;left:0;right:0;height:58px;
  background:rgba(245,242,238,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.07);
  display:flex;align-items:center;padding:0;z-index:9999;
  max-width:480px;margin:0 auto;
}
.gc-bn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;padding:6px 0;
  text-decoration:none;color:inherit;position:relative;
}
.gc-bn-i{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.gc-bn-i svg{stroke:#b0aba3;stroke-width:1.8;transition:stroke .15s;}
.gc-bn-l{font-size:9px;font-weight:600;color:#b0aba3;letter-spacing:.3px;text-transform:uppercase;transition:color .15s;}
.gc-bn.active .gc-bn-l{color:#e85d26;}
.gc-bn.active .gc-bn-i svg{stroke:#e85d26 !important;}
.gc-bn:hover .gc-bn-l{color:#6b6660;}
.gc-bn:hover .gc-bn-i svg{stroke:#6b6660;}
.gc-bn-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  background:var(--orange);color:#fff;
  font-size:9px;font-weight:700;
  min-width:16px;height:16px;padding:0 4px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="tb-title">Chat</div>
    <div class="tb-icons">
      <button class="tb-icon-btn" id="searchToggle" title="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="tb-icon-btn" title="Filter">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      </button>
      <div class="tb-avatar" title="Your profile">
        AZ
        <div class="tb-avatar-dot"></div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="all">Messages <span class="tab-badge">7</span></button>
    <button class="tab" data-tab="unread">Unread <span class="tab-badge">4</span></button>
    <button class="tab" data-tab="requests">Requests <span class="tab-badge">2</span></button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search conversations…">
  </div>
</div>

<!-- CONVERSATION LIST -->
<div class="scroll-area" id="scrollArea">
  <div class="conv-list" id="convList">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- FAB -->
<button class="fab" title="New message">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
</button>

<!-- CHAT OVERLAY -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-header">
    <button class="chat-back" onclick="closeChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="chat-peer-avatar" id="chatAvatar"></div>
    <div class="chat-peer-info">
      <div class="chat-peer-name" id="chatName"></div>
      <div class="chat-peer-sub" id="chatSub"></div>
    </div>
    <button class="chat-more-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <button class="chat-attach">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <div class="chat-input-wrap">
      <input placeholder="Message…" id="msgInput" onkeydown="sendMsg(event)">
    </div>
    <button class="chat-send" onclick="sendMsgBtn()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

</div><!-- /app -->

// ── DATA ──
const convData = [

let currentChat = null;
let currentTab = 'all';

// ── RENDER ──
function getFilteredConvs(tab){
  if(tab === 'all') return convData.filter(c => c.type !== 'request');
  if(tab === 'unread') return convData.filter(c => c.unread > 0 && c.type !== 'request');
  if(tab === 'requests') return convData.filter(c => c.type === 'request');
  return convData;
}

function renderList(){
  const list = document.getElementById('convList');
  const convs = getFilteredConvs(currentTab);
  
  if(convs.length === 0){
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>No messages here yet</p>
    </div>`;
    return;
  }

  list.innerHTML = convs.map(c => {
    const hasUnread = c.unread > 0;
    const statusDot = c.online 
      ? `<div class="av-online-dot"></div>` 
      : c.busy ? `<div class="av-busy-dot"></div>` : '';
    
    let previewHtml = '';
    if(c.previewIsMe){
      previewHtml = `<span class="sender-prefix">You: </span>${c.preview.replace('You: ','')}`;
    } else {
      previewHtml = c.preview;
    }

    return `<div class="conv-row ${hasUnread ? 'has-unread' : ''}" onclick="openChat(${c.id})">
      <div class="conv-avatar" style="background:${c.color}">
        ${c.initials}
        ${statusDot}
      </div>
      <div class="conv-body">
        <div class="conv-row1">
          <span class="conv-name ${hasUnread ? 'unread' : ''}">${c.name}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-preview ${hasUnread ? 'unread' : ''}">${previewHtml}</div>
      </div>
    </div>`;
  }).join('');
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    renderList();
  });
});

// ── CHAT ──
function openChat(id){
  const d = convData.find(c => c.id === id);
  if(!d) return;
  currentChat = id;
  
  document.getElementById('chatName').textContent = d.name;
  document.getElementById('chatSub').textContent = d.company;
  const av = document.getElementById('chatAvatar');
  av.textContent = d.initials;
  av.style.background = d.color;

  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '<div class="date-sep">Today</div>';
  d.messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg' + (m.me ? ' me' : '');
    if(!m.me){
      div.innerHTML = `<div class="msg-av" style="background:${d.color}">${d.initials}</div><div class="msg-bubble">${m.text}</div><span class="msg-time">${m.time}</span>`;
    } else {
      div.innerHTML = `<span class="msg-time">${m.time}</span><div class="msg-bubble">${m.text}</div>`;
    }
    msgs.appendChild(div);
  });
  msgs.scrollTop = msgs.scrollHeight;
  
  // Mark as read
  d.unread = 0;
  
  document.getElementById('chatOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeChat(){
  document.getElementById('chatOverlay').classList.remove('open');
  document.body.style.overflow = '';
  renderList(); // refresh to show read state
}

function sendMsg(e){ if(e.key === 'Enter') sendMsgBtn(); }
function sendMsgBtn(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text) return;
  const msgs = document.getElementById('chatMessages');
  const d = convData.find(c => c.id === currentChat);
  const div = document.createElement('div');
  div.className = 'msg me';
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = `<span class="msg-time">${time}</span><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  inp.value = '';
}

// ── SEARCH ──
document.getElementById('searchToggle').addEventListener('click', () => {
  const wrap = document.getElementById('searchWrap');
  wrap.classList.toggle('show');
  const btn = document.getElementById('searchToggle');
  btn.classList.toggle('active');
  if(wrap.classList.contains('show')) document.getElementById('searchInput').focus();
});

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const list = document.getElementById('convList');
  const convs = getFilteredConvs(currentTab).filter(c => 
    c.name.toLowerCase().includes(q) || 
    c.company.toLowerCase().includes(q) ||
    c.preview.toLowerCase().includes(q)
  );
  if(convs.length === 0){
    list.innerHTML = `<div class="empty-state"><p>No results for "${e.target.value}"</p></div>`;
    return;
  }
  list.innerHTML = convs.map(c => {
    const hasUnread = c.unread > 0;
    const statusDot = c.online ? `<div class="av-online-dot"></div>` : c.busy ? `<div class="av-busy-dot"></div>` : '';
    return `<div class="conv-row ${hasUnread ? 'has-unread' : ''}" onclick="openChat(${c.id})">
      <div class="conv-avatar" style="background:${c.color}">${c.initials}${statusDot}</div>
      <div class="conv-body">
        <div class="conv-row1">
          <span class="conv-name ${hasUnread ? 'unread' : ''}">${c.name}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-preview ${hasUnread ? 'unread' : ''}">${c.preview}</div>
      </div>
    </div>`;
  }).join('');
});

document.addEventListener('keydown', e => { if(e.key === 'Escape') closeChat(); });

// ── INIT ──
renderList();
</script>
